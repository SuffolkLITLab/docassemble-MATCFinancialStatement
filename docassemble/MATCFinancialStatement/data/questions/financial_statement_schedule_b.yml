---
modules:
  - docassemble.base.util
---
metadata:
  title: |
    Financial Statement Schedule B
  short title: |
    Schedule B
  description: |
    Schedule B questions for rental income and rental expenses.
  LIST_topics:
    - Family law
    - Financial disclosure
  jurisdiction: NAM-US-US+MA
  landing_page_url: https://courtformsonline.org/
  authors:
    - Court Forms Online
---
variable name: schedule_b_expense_choices
data:
  - [advertising, "Advertising"]
  - [motor_vehicle_travel, "Motor vehicle and travel"]
  - [insurance, "Insurance"]
  - [cleaning_maintenance, "Cleaning and maintenance"]
  - [commissions, "Commissions"]
  - [mortgage_interest, "Interest on mortgage to banks"]
  - [other_interest, "Other interest"]
  - [legal_professional, "Legal and professional services"]
  - [repairs, "Repairs"]
  - [supplies, "Supplies"]
  - [taxes, "Taxes"]
  - [utilities, "Utilities"]
  - [wages, "Wages"]
  - [other, "Other expenses"]
---
id: schedule_b_sections
sets:
  - users[i].schedule_b_sections

code: |
  users[i].schedule_b_intro
  users[i].schedule_b_rent_received
  users[i].schedule_b_expenses_list
  users[i].schedule_b_expenses.statement_user = users[i]
  users[i].schedule_b_expenses.gather()
  users[i].schedule_b_expense_totals
  users[i].schedule_b_weekly_income
  users[i].schedule_b_sections = True
---
id: schedule_b_intro
continue button field: users[i].schedule_b_intro
question: |
  Schedule B: rental income
subquestion: |
  % if users.number_gathered() > 1:
  ${ bold(users[i].familiar(unique_names=users)) } indicated rental income.
  % else:
  You indicated that you have rental income.
  % endif
  This schedule asks for rental income and rental expenses.
---
id: schedule_b_rent_received
sets:
  - users[i].schedule_b_rent_received

continue button field: users[i].schedule_b_rent_received
question: |
  Annual rent
subquestion: |
  % if users.number_gathered() > 1:
  Enter the total rent ${ bold(users[i].familiar(unique_names=users)) } gets in a typical year before expenses.
  % else:
  Enter the total rent you get in a typical year before expenses.
  % endif
fields:
  - Annual rent: users[i].schedule_b_annual_rent_received
    datatype: currency
    required: False
    help: |
      Enter the total rent you get in a typical year before expenses.
---
id: schedule_b_expenses_list
sets:
  - users[i].schedule_b_expenses_list

continue button field: users[i].schedule_b_expenses_list
question: |
  Annual rental expenses
subquestion: |
  Add each expense line item and its annual amount. If you are not sure,
  give your best estimate.
fields:
  - label: |
      % if users.number_gathered() > 1:
      Does ${ bold(users[i].familiar(unique_names=users)) } have rental expenses to list?
      % else:
      Do you have rental expenses to list?
      % endif
    field: users[i].schedule_b_expenses.there_are_any
    datatype: yesno
---
id: schedule_b_expense_item
question: |
  Rental expense
subquestion: |
  Enter the annual amount for this category.
fields:
  - Expense category: users[i].schedule_b_expenses[j].source
    code: |
      schedule_b_expense_choices
  - Expense description (if needed): users[i].schedule_b_expenses[j].description
    required: False
  - Annual amount: users[i].schedule_b_expenses[j].value
    datatype: currency
    required: False
    help: |
      Enter the total amount you pay in a typical year for this category.
---
code: |
  users[i].schedule_b_expenses[j].times_per_year = 1
  users[i].schedule_b_expenses[j].display_name = dict(schedule_b_expense_choices).get(
    users[i].schedule_b_expenses[j].source,
    users[i].schedule_b_expenses[j].source,
  )
  users[i].schedule_b_expenses[j].complete = True
---
code: |
  if defined("users[i].schedule_b_expenses.there_are_any"):
    if users[i].schedule_b_expenses.there_are_any:
      for expense in users[i].schedule_b_expenses.elements:
        expense.value
    users[i].schedule_b_expenses.revisit = True
---
table: users[i].schedule_b_expenses.table
rows: users[i].schedule_b_expenses
columns:
  - Expense: |
      row_item.display_name if hasattr(row_item, "display_name") else row_item.source
  - Annual amount: |
      currency(row_item.total(times_per_year=1))
edit:
  - source

  - description

  - value

---
id: schedule_b_expenses_revisit
continue button field: users[i].schedule_b_expenses.revisit
question: |
  Edit rental expenses
subquestion: |
  % if defined("users[i].schedule_b_expenses.there_are_any") and users[i].schedule_b_expenses.there_are_any and len(users[i].schedule_b_expenses):
  ${ users[i].schedule_b_expenses.table }
  % else:
  % if users.number_gathered() > 1:
  ${ bold(users[i].familiar(unique_names=users)) } has not added any rental expenses yet.
  % else:
  You have not added any rental expenses yet.
  % endif
  % endif

  Use "Add another" if you need to add an expense now.

  ${ users[i].schedule_b_expenses.add_action() }
---
id: schedule_b_expenses_more
question: |
  Do you have another rental expense to add?
subquestion: |
  Check this box only if you have another rental expense to add.
fields:
  - label: |
      % if users.number_gathered() > 1:
      Does ${ bold(users[i].familiar(unique_names=users)) } have another rental expense to add?
      % else:
      Do you have another rental expense to add?
      % endif
    field: users[i].schedule_b_expenses.there_is_another
    datatype: yesno
---
code: |
  users[i].schedule_b_total_annual_expenses = float(users[i].schedule_b_expenses.total(times_per_year=1))
---
id: schedule_b_expense_totals
continue button field: users[i].schedule_b_expense_totals
question: |
  Annual expense total
subquestion: |
  ${ currency(users[i].schedule_b_total_annual_expenses) }
---
code: |
  users[i].schedule_b_weekly_rental_income = (
    (float(value("users[i].schedule_b_annual_rent_received") or 0) - users[i].schedule_b_total_annual_expenses) / 52
  )
---
id: schedule_b_weekly_income
continue button field: users[i].schedule_b_weekly_income
question: |
  Weekly rental income
subquestion: |
  Weekly rental income = (annual rent - annual expenses) divided by 52
  ${ currency(users[i].schedule_b_weekly_rental_income) }
