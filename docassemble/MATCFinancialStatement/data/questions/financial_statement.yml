---
modules:
  - docassemble.base.util
  - .financial_statement_helpers
---
include:
  - docassemble.AssemblyLine:assembly_line.yml
  - docassemble.ALMassachusetts:al_massachusetts.yml
  - docassemble.MassAccess:massaccess.yml
  - docassemble.ALToolbox:al_income.yml
  - financial_statement_shared.yml
  - financial_statement_short.yml
  - financial_statement_long.yml
  - financial_statement_schedule_a.yml
  - financial_statement_schedule_b.yml
---
objects:
  - users[i].financial_statement_short_attachment: ALDocument.using(title="Financial Statement (Short Form)", filename="financial_statement_short", has_addendum=False, enabled=True)
  - users[i].financial_statement_long_attachment: ALDocument.using(title="Financial Statement (Long Form)", filename="financial_statement_long", has_addendum=False, enabled=True)
  - users[i].financial_statement_schedule_a_attachment: ALDocument.using(title="Schedule A - Self-Employment Income", filename="financial_statement_schedule_a", has_addendum=False, enabled=True)
  - users[i].financial_statement_schedule_b_attachment: ALDocument.using(title="Schedule B - Rental Income", filename="financial_statement_schedule_b", has_addendum=False, enabled=True)
---
id: interview_order_financial_statement
code: |
  nav.set_sections(al_nav_sections)
  nav.set_section("introduction")
  set_progress(5)
  fs_intro
  set_financial_statement_party_labels
  financial_statement_person_role

  financial_statement_selected_count

  financial_statement_review_user_index = None
  for i in range(len(users)):
    users[i].making_statement_for
    if users[i].making_statement_for:
      financial_statement_review_user_index = i
      if financial_statement_selected_count > 1:
        users[i].financial_statement_start
      nav.set_section("eligibility")
      set_progress(15)
      users[i].gross_annual_income
      users[i].financial_form_type

      nav.set_section("court_and_parties")
      set_progress(25)
      financial_statement_court_division
      docket_number
      users[0].name.first
      users[1].name.first
      users[i].fs_checkpoint_court_and_parties

      nav.set_section("personal_information")
      set_progress(35)
      users[i].birthdate
      users[i].phone_number
      users[i].address.address
      users[i].employer_name
      if users[i].employer_name or users[i].job_title:
        users[i].employer_address_street
      users[i].has_health_insurance
      users[i].fs_checkpoint_personal_information

      nav.set_section("cadence")
      set_progress(45)
      users[i].financial_cadence_default

      nav.set_section("income")
      set_progress(55)
      users[i].income_list.statement_user = users[i]
      users[i].income_list.gathered
      users[i].income_schedule_triggers

      if users[i].has_self_employment_income:
        users[i].schedule_a_sections
      if users[i].has_rental_income:
        users[i].schedule_b_sections
      users[i].income_totals
      users[i].income_explanation
      if users[i].income_requires_confirmation:
        users[i].confirm_no_income_screen
      users[i].fs_checkpoint_income

      if users[i].financial_form_type == "short":
        users[i].short_form_sections
      else:
        users[i].long_form_sections

  nav.set_section("review")
  set_progress(95)
  i = financial_statement_review_user_index
  financial_statement_review_complete

  nav.set_section("download")
  set_progress(100)

  interview_order_financial_statement = True
---
code: |
  users[0].party_label = "Party A / Petitioner"
  users[1].party_label = "Party B / Defendant"
  set_financial_statement_party_labels = True
---
id: financial_statement_person_role
question: |
  What is your role in this case?
subquestion: |
  If you are not sure, choose **Party A / Petitioner**.
fields:
  - no label: financial_statement_person_role
    datatype: radio
    default: party_a
    choices:
      - Party A / Petitioner: party_a
      - Party B / Defendant: party_b
---
code: |
  financial_statement_selected_count = sum(1 for user in users if user.making_statement_for)
---
id: financial statement spouses
question: |
  Whose financial statement do you want to prepare?
fields:
  - Party A / Petitioner: users[0].making_statement_for
    datatype: yesno
    default: ${ financial_statement_person_role == "party_a" }
  - Party B / Defendant: users[1].making_statement_for
    datatype: yesno
    default: ${ financial_statement_person_role == "party_b" }
validation code: |
  if not users[0].making_statement_for and not users[1].making_statement_for:
    validation_error("Select at least one spouse to prepare a financial statement for.")
---
id: financial_statement_start
continue button field: users[i].financial_statement_start
question: |
  % if financial_statement_selected_count > 1:
  We will start with the financial statement for ${ bold(users[i].familiar(unique_names=users)) }.
  % else:
  We will start with your financial statement.
  % endif
---
id: financial_form_type
code: |
  if users[i].gross_annual_income >= 75000:
    users[i].financial_form_type = "long"
  else:
    users[i].financial_form_type = "short"
---
sets:
  - users[i].short_expense_other_description

code: |
  users[i].short_expense_other_description = fs_expense_descriptions(users[i].expense_list, "other")
---
