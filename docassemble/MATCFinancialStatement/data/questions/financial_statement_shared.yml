id: fs_intro
continue button field: fs_intro
question: |
  Financial Statement
subquestion: |
  This interview helps you prepare a Massachusetts financial statement for
  court.

  **What to gather before you start**

  - Recent pay stubs or benefit statements
  - Recent bills or statements for regular expenses
  - Account balances for assets and debts

  <div class="alert alert-info" role="alert">
    <strong>Tip:</strong> Keep your pay information, bills, and account balances nearby.
    Most people finish faster when they can enter each amount from one real document.
  </div>

  **What happens here**

  1. We figure out which financial statement form applies.
     ${ collapse_template(fs_intro_step_1) }
  2. You enter income, deductions, and regular expenses.
     ${ collapse_template(fs_intro_step_2) }
  3. You list property, accounts, and debts that belong on the form.
     ${ collapse_template(fs_intro_step_3) }
  4. We calculate weekly totals and show you a final review screen.
     ${ collapse_template(fs_intro_step_4) }
  5. You sign and download the completed court forms.
     ${ collapse_template(fs_intro_step_5) }

  **How long this usually takes**

  Most people finish in about 20 to 40 minutes.

  **Help along the way**

  You will see short explanations for legal or financial terms.

  Example help term:
  <span class="text-success"><strong>gross annual income</strong></span>

  Example definition:
  Total income before taxes for the last 12 months.

  On later screens, tap a green term to open a short explanation.

  - Your work is saved as you go, so you can come back later.

  <div class="alert alert-warning" role="alert">
    <strong>Important:</strong> You must complete this form truthfully and as fully as you can.
    Filing under the pains and penalties of perjury means you are legally swearing
    that the information is true, accurate, and complete to the best of your knowledge.
  </div>

  Estimates are OK when you do not know an exact number. Use your best,
  good-faith numbers so the court gets a clear picture.
---
template: fs_intro_step_1
subject: |
  About the form type
content: |
  We ask for your gross annual income first because Massachusetts uses
  different financial statement forms depending on your income.
---
template: fs_intro_step_2
subject: |
  About amount entry
content: |
  Enter one real amount at a time, then choose how often it happens.

  Example:
  If your electric bill is $120 each month, enter `120` and choose `Monthly`.
---
template: fs_intro_step_3
subject: |
  About assets and debts
content: |
  We will ask about real estate, vehicles, retirement accounts, other assets,
  and debts like loans or credit cards.
---
template: fs_intro_step_4
subject: |
  About totals
content: |
  The interview converts amounts to the weekly totals the court form expects,
  so you do not need to do that math yourself.
---
template: fs_intro_step_5
subject: |
  About the finish
content: |
  Before you download, you will get a review screen where you can jump back to
  fix anything that looks wrong or incomplete.
---
template: fs_amount_entry_help
subject: |
  How amount entry works
content: |
  - Enter the amount from one paycheck, bill, or statement.
  - Choose how often that amount happens.
  - Do not convert it to weekly or yearly yourself. The interview does that for you.

  **Examples**
  - Paid $900 every 2 weeks: enter `900` and choose `Every 2 weeks`
  - Electric bill is $120 per month: enter `120` and choose `Monthly`
---
template: fs_estimate_help
subject: |
  Using estimates
content: |
  If you do not know an exact amount:
  - use the most recent number you have
  - average a few recent statements if the amount changes
  - round to the nearest dollar if needed

  A good-faith estimate is usually better than leaving an answer blank.
---
id: gross_annual_income
question: |
  Gross annual income
subquestion: |
  Enter your total income before taxes for the last 12 months.

  We use this answer to decide whether the court requires the short form or the
  long form.

  **Include:** wages, tips, overtime, benefits, rental income, and other income.
  If you are not sure, give your best estimate.

  ${ collapse_template(fs_estimate_help) }
fields:
  - I do not know my gross annual income: gross_annual_income_unknown
    datatype: yesno
  - Gross annual income: gross_annual_income
    datatype: currency
    min: 0
    show if:
      variable: gross_annual_income_unknown
      is: False
    help: |
      Use your best estimate if you are unsure.
  - Best estimate of gross annual income: gross_annual_income_estimate
    datatype: currency
    min: 0
    required: True
    show if:
      variable: gross_annual_income_unknown
      is: True
    help: |
      This estimate helps the court decide whether the short or long form applies.
---
code: |
  if defined("gross_annual_income_unknown") and gross_annual_income_unknown:
    gross_annual_income = value("gross_annual_income_estimate") or 0
---
