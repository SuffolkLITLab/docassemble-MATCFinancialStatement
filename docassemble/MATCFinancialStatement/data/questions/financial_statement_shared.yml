  Most amounts will use this schedule. You can change it later for any item.

  **Example:** If you are paid every 2 weeks and your pay is $900 per check,
  choose "Every 2 weeks" and enter 900.

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Pay frequency: financial_cadence_default
    input type: radio
    code: |
      cadence_choices
    default: weekly
    help: |
      Choose the schedule that matches your main paycheck or most bills.
---
id: fs_income_sources
generic object: ALIncomeList
question: |
  Gross income sources
subquestion: |
  Choose all income sources you receive.

  You will enter the amount and how often you receive it on the next screen.
  If a category is missing, choose "Other income."
  If none apply, choose "None of the above."

  We will pause after the income section so you can review or edit it before
  you move on.
fields:
  - no label: x.selected_types
    datatype: checkboxes
    code: |
      fs_income_checkbox_terms_ordered
---
generic object: ALIncomeList
code: |
  x.selected_types
  x.move_checks_to_list(selected_terms=fs_income_terms)
  x.moved = True
---
id: fs_income_item
generic object: ALIncomeList
question: |
  Income details
subquestion: |
  Tell us about your ${ ordinal(i) } income. Enter the amount for a single
  pay period and choose how often you receive it. We will convert everything
  to a weekly amount for the court form.

  **Example:** If you receive $300 monthly, enter 300 and choose "Monthly."

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Type of income: x[i].source
    code: |
      fs_income_terms_ordered
    default: other
  - Description (if needed): x[i].description
    required: False
  - Amount: x[i].value
    datatype: currency
  - Use my default cadence (${ financial_cadence_default }): x[i].use_default_cadence
    datatype: yesno
    default: True
  - How often do you receive this income?: x[i].times_per_year
    input type: radio
    code: |
      times_per_year_list
    default: cadence_to_times_per_year(value("financial_cadence_default") if defined("financial_cadence_default") else "weekly")
    show if:
      variable: x[i].use_default_cadence
      is: False
validation code: |
  if x[i].source == "other":
    x[i].display_name = fs_text_or_default(getattr(x[i], "description", ""), fs_income_terms.get(x[i].source, x[i].source))
  else:
