  ${ action_button_html(url_action('review_liabilities_long_fs' if financial_form_type == 'long' else 'review_liabilities_short_fs'), label='Review or edit this section', color='info') }

  Press **Next** when you are ready to keep going.
---
id: review_fs
event: review_fs
question: |
  Edit your answers
subquestion: |
  Choose any item below to edit it.

  **Jump to a major section**

  ${ action_button_html(url_action('review_court_and_parties_fs'), label='Court and parties', color='secondary', size='sm') }
  ${ action_button_html(url_action('review_personal_information_fs'), label='Personal information', color='secondary', size='sm') }
  ${ action_button_html(url_action('review_income_fs'), label='Income', color='secondary', size='sm') }
  ${ action_button_html(url_action('review_deductions_long_fs' if financial_form_type == 'long' else 'review_deductions_short_fs'), label='Deductions', color='secondary', size='sm') }
  ${ action_button_html(url_action('review_expenses_long_fs' if financial_form_type == 'long' else 'review_expenses_short_fs'), label='Expenses', color='secondary', size='sm') }
  ${ action_button_html(url_action('review_assets_long_fs' if financial_form_type == 'long' else 'review_assets_short_fs'), label='Assets', color='secondary', size='sm') }
  ${ action_button_html(url_action('review_liabilities_long_fs' if financial_form_type == 'long' else 'review_liabilities_short_fs'), label='Liabilities and signatures', color='secondary', size='sm') }
review:
  - Edit: trial_court
    button: |
      **Court**
      ${ financial_statement_court_division if defined("financial_statement_court_division") and financial_statement_court_division else "" }
  - Edit: docket_number
    button: |
      **Docket number**
      ${ docket_number if defined("docket_number") and docket_number else "Not provided" }
  - Edit: fs_user.name.first
    button: |
      **Your name**
      ${ fs_user if defined("fs_user.name.first") else "" }
  - Edit: fs_other_user.name.first
    button: |
      **Other party**
      ${ fs_other_user if defined("fs_other_user.name.first") else "Not provided" }
  - Edit: fs_user.birthdate
    button: |
      **Birth date**
      ${ fs_user.birthdate if defined("fs_user.birthdate") else "Not provided" }
  - Edit: fs_user.phone_number
    button: |
      **Phone**
      ${ fs_user.phone_number if defined("fs_user.phone_number") and fs_user.phone_number else "Not provided" }
  - Edit: fs_user.address.address
    button: |
      **Address**
      ${ fs_user.address.on_one_line() if defined("fs_user.address.address") else "Not provided" }
  - Edit: financial_cadence_default
    button: |
      **Cadence**
      ${ financial_cadence_default if defined("financial_cadence_default") else "" }
  - Edit: income_list.revisit
    button: |
      **Income**
      Weekly total: ${ currency(income_total_weekly) }
  - Edit: income_explanation_note
    button: |
      **Income explanation**
      ${ income_explanation_note if defined("income_explanation_note") and income_explanation_note else "Not provided" }
  - Edit: has_self_employment_income
    button: |
      **Self-employment income**
      ${ "Yes" if defined("has_self_employment_income") and has_self_employment_income else ("No" if defined("has_self_employment_income") else "Not answered") }
  - Edit: has_rental_income
    button: |
      **Rental income**
      ${ "Yes" if defined("has_rental_income") and has_rental_income else ("No" if defined("has_rental_income") else "Not answered") }
---
code: |
  try:
    fs_section_links = section_links(nav)
  except:
    fs_section_links = []
---
event: review_all_sections_fs
question: |
  Review by section
subquestion: |
  <div class="alert alert-info" role="alert">
    <strong>Tip:</strong> Use the section list on the left or the links below to jump
    back and update a part of your financial statement before you download.
  </div>

  % if fs_section_links:
  **Jump to a section**
  % for section in fs_section_links:
  * ${ section }
  % endfor
  % else:
  The section links are not available right now. Use the left-side section list
  or the button below to edit individual answers.
  % endif

  ${ action_button_html(url_action('review_fs'), label='Edit individual answers', color='info', size='sm') }

  Press **Resume** to return to your download page when you are done.
buttons:
  Resume: continue
---
id: fs_review
continue button field: fs_review
question: |
  Review by section
subquestion: |
  Form type: ${ financial_form_type.upper() }

  Gross weekly income: ${ currency(income_total_weekly) }

  <div class="alert alert-info" role="alert">
    <strong>Tip:</strong> Use the section list on the left or the links below to jump
    back and update part of your financial statement before you download.
  </div>

  % if fs_section_links:
  **Jump to a section**
  % for section in fs_section_links:
  * ${ section }
  % endfor
  % endif

  ${ action_button_html(url_action('review_fs'), label='Edit individual answers', color='info', size='sm') }

  **Things to check before download**
  - Your income sources and amounts
  - Whether Schedule A or Schedule B applies
  - Expenses, assets, and liabilities
  - Contact information and signatures
  % if defined("income_explanation_note") and income_explanation_note:

  **Saved income explanation**
  ${ income_explanation_note }
  % endif
---
id: fs_download
event: fs_download
question: |
  Download your financial statement
subquestion: |
  Your financial statement is ready. You can download the forms below.

  <div class="alert alert-info" role="alert">
    <strong>Reminder:</strong> This interview prepares the forms, but it does not file
    them for you.
  </div>

  **Next steps**
  1. Download and review the PDFs.
  2. Sign anywhere the court requires your signature.
  3. File the forms with the court if you are ready to submit them.
  4. Give copies to the other party if your court requires that step.

  If you are e-filing, gather any supporting documents the court expects before
  you submit your packet.

  % if defined("income_explanation_note") and income_explanation_note:
  **Income explanation note**
  Keep this note with your filing materials. It is not added to the court PDF:

  ${ income_explanation_note }
  % endif

  ${ action_button_html(url_action('review_all_sections_fs'), label='Edit answers', color='info') }

  ${ al_user_bundle.download_list_html() }

  ${ al_user_bundle.send_button_html(show_editable_checkbox=False) }

  ${ collapse_template(fs_attachment_checklist, collapsed=False) }
progress: 100
---
template: fs_attachment_checklist
content: |
  **Attachment checklist**
  - Recent pay stubs or benefit statements
  - Copies of W-2 and 1099 forms for the prior year if the court asks for them
  - Proof of child care or medical costs (if applicable)
  - Business income and expense records for Schedule A
  - Rental income and expense records for Schedule B
  - Any short explanation you want to keep with the packet for estimated or irregular income
  - Review local court or e-filing instructions for how to upload or submit attachments
