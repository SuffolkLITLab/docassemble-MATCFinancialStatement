  the court PDF automatically.

  Leave this blank if you do not want to save a note.
fields:
  - Explanation to keep with your filing materials: income_explanation_note
    datatype: area
    required: False
validation code: |
  if not defined("income_explanation_note") or not income_explanation_note:
    income_explanation_note = ""
  else:
    income_explanation_note = income_explanation_note.strip()
  income_explanation_needed = bool(income_explanation_note)
---
code: |
  if not income_requires_confirmation:
    confirm_no_income = False
