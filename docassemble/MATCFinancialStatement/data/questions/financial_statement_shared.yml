id: income_totals
continue button field: users[i].income_totals
question: |
  Income summary
subquestion: |
  We will convert your amounts to weekly values for the financial statement.
  You can still go back and edit any income source before you download.

  Total gross weekly income (current): ${ currency(users[i].income_total_weekly) }
---
code: |
  # Normalize mixed Decimal/float totals before arithmetic.
  users[i].income_total_weekly = fs_safe_float(users[i].income_list.total(times_per_year=52))

  if defined("users[i].schedule_a_weekly_business_income"):
    users[i].income_self_employment_weekly = fs_safe_float(users[i].schedule_a_weekly_business_income)
  else:
    users[i].income_self_employment_weekly = 0

  if defined("users[i].schedule_b_weekly_rental_income"):
    users[i].income_rental_weekly = fs_safe_float(users[i].schedule_b_weekly_rental_income)
  else:
    users[i].income_rental_weekly = 0

  users[i].income_total_weekly = (
    users[i].income_total_weekly
    + users[i].income_self_employment_weekly
    + users[i].income_rental_weekly
  )

  fs_has_any_income_entries = (
    len(users[i].income_list) > 0
    or users[i].has_self_employment_income
    or users[i].has_rental_income
  )
  users[i].income_requires_confirmation = (
    (not fs_has_any_income_entries)
    or users[i].income_total_weekly == 0
  )
