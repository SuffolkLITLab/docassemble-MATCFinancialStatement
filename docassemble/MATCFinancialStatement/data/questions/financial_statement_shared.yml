---
id: fs_intro
continue button field: fs_intro
question: |
  Financial Statement
subquestion: |
  This interview helps you prepare a Massachusetts financial statement for
  court.

  **What to gather before you start**

  - Recent pay stubs or benefit statements
  - Recent bills or statements for regular expenses
  - Account balances for assets and debts

  <div class="alert alert-info" role="alert">
    <strong>Tip:</strong> Keep your pay information, bills, and account balances nearby.
    Most people finish faster when they can enter each amount from one real document.
  </div>

  **What happens here**

  1. We figure out which financial statement form applies.
     ${ collapse_template(fs_intro_step_1) }
  2. You enter income, deductions, and regular expenses.
     ${ collapse_template(fs_intro_step_2) }
  3. You list property, accounts, and debts that belong on the form.
     ${ collapse_template(fs_intro_step_3) }
  4. We calculate weekly totals and show you a final review screen.
     ${ collapse_template(fs_intro_step_4) }
  5. You sign and download the completed court forms.
     ${ collapse_template(fs_intro_step_5) }

  **How long this usually takes**

  Most people finish in about 20 to 40 minutes.

  **Help along the way**

  You will see short explanations for legal or financial terms.

  Example help term:
  <span class="text-success"><strong>gross annual income</strong></span>

  Example definition:
  Total income before taxes for the last 12 months.

  On later screens, tap a green term to open a short explanation.

  - Your work is saved as you go, so you can come back later.

  <div class="alert alert-warning" role="alert">
    <strong>Important:</strong> You must complete this form truthfully and as fully as you can.
    Filing under the pains and penalties of perjury means you are legally swearing
    that the information is true, accurate, and complete to the best of your knowledge.
  </div>

  Estimates are OK when you do not know an exact number. Use your best,
  good-faith numbers so the court gets a clear picture.
---
template: fs_intro_step_1
subject: |
  About the form type
content: |
  We ask for your gross annual income first because Massachusetts uses
  different financial statement forms depending on your income.
---
template: fs_intro_step_2
subject: |
  About amount entry
content: |
  Enter one real amount at a time, then choose how often it happens.

  Example:
  If your electric bill is $120 each month, enter `120` and choose `Monthly`.
---
template: fs_intro_step_3
subject: |
  About assets and debts
content: |
  We will ask about real estate, vehicles, retirement accounts, other assets,
  and debts like loans or credit cards.
---
template: fs_intro_step_4
subject: |
  About totals
content: |
  The interview converts amounts to the weekly totals the court form expects,
  so you do not need to do that math yourself.
---
template: fs_intro_step_5
subject: |
  About the finish
content: |
  Before you download, you will get a review screen where you can jump back to
  fix anything that looks wrong or incomplete.
---
template: fs_amount_entry_help
subject: |
  How amount entry works
content: |
  - Enter the amount from one paycheck, bill, or statement.
  - Choose how often that amount happens.
  - Do not convert it to weekly or yearly yourself. The interview does that for you.

  **Examples**
  - Paid $900 every 2 weeks: enter `900` and choose `Every 2 weeks`
  - Electric bill is $120 per month: enter `120` and choose `Monthly`
---
template: fs_estimate_help
subject: |
  Using estimates
content: |
  If you do not know an exact amount:
  - use the most recent number you have
  - average a few recent statements if the amount changes
  - round to the nearest dollar if needed

  A good-faith estimate is usually better than leaving an answer blank.
---
id: gross_annual_income
question: |
  Gross annual income
subquestion: |
  Enter your total income before taxes for the last 12 months.

  We use this answer to decide whether the court requires the short form or the
  long form.

  **Include:** wages, tips, overtime, benefits, rental income, and other income.
  If you are not sure, give your best estimate.

  ${ collapse_template(fs_estimate_help) }
fields:
  - I do not know my gross annual income: users[i].gross_annual_income_unknown
    datatype: yesno
  - Gross annual income: users[i].gross_annual_income
    datatype: currency
    min: 0
    show if:
      variable: users[i].gross_annual_income_unknown

      is: False
    help: |
      Use your best estimate if you are unsure.
  - Best estimate of gross annual income: users[i].gross_annual_income_estimate
    datatype: currency
    min: 0
    required: True
    show if:
      variable: users[i].gross_annual_income_unknown

      is: True
    help: |
      This estimate helps the court decide whether the short or long form applies.
---
code: |
  if defined("users[i].gross_annual_income_unknown") and users[i].gross_annual_income_unknown:
    users[i].gross_annual_income = value("users[i].gross_annual_income_estimate") or 0
---
id: financial_statement_court_division
question: |
  Court division
subquestion: |
  Enter the Probate and Family Court division for this case.
fields:
  - Court division: financial_statement_court_division
    required: False
---
id: docket_number
question: |
  Docket number
subquestion: |
  Enter the docket number only if the court has already assigned one.

  If you are starting the case and do not have a docket number yet, leave this
  blank.
fields:
  - Docket number: docket_number
    required: False
    help: |
      A docket number is assigned after a case is filed.
---
id: user_and_other_party_names
sets:
  - users[0].name.first
  - users[1].name.first
question: |
  Party names
subquestion: |
  Use legal names as they appear on court paperwork.

  If you do not know the other party's information yet, you can leave those
  fields blank for now.
fields:
  - note: |
      **Party A / Petitioner name**
  - code: |
      users[0].name_fields()
  - note: |
      **Party B / Defendant name**
  - code: |
      users[1].name_fields()
---
id: user_personal_info
sets:
  - users[i].user_personal_info

question: |
  % if users.number_gathered() > 1:
  Personal information for ${ bold(users[i].familiar(unique_names=users)) }
  % else:
  Personal information for you
  % endif
subquestion: |
  We ask about children to match the court form.
  % if users.number_gathered() > 1:
  If ${ bold(users[i].familiar(unique_names=users)) } does not have children, leave the count at 0.
  % else:
  If you do not have children, leave the count at 0.
  % endif

  Social Security number is optional. Enter only the last 4 digits.
fields:
  - Social Security number (last 4 digits): users[i].ssn
    required: False
    maxlength: 4
    help: |
      Optional. Enter only the last 4 digits (example: 1234).
  - Date of birth: users[i].birthdate
    datatype: date
    help: |
      Use month/day/year format.
  - label: |
      % if users.number_gathered() > 1:
      Does ${ bold(users[i].familiar(unique_names=users)) } have any children?
      % else:
      Do you have any children?
      % endif
    field: users[i].has_children
    datatype: yesno
  - Number of children living with you: users[i].children_living_with_user_count
    datatype: integer
    required: False
    min: 0
    show if:
      variable: users[i].has_children

      is: True
  - Occupation: users[i].job_title
    required: False
---
code: |
  if defined("users[i].has_children") and not users[i].has_children:
    users[i].children_living_with_user_count = 0
---
id: user_contact_info
sets:
  - users[i].user_contact_info

question: |
  % if users.number_gathered() > 1:
  Contact information for ${ bold(users[i].familiar(unique_names=users)) }
  % else:
  Contact information for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Give contact details where ${ bold(users[i].familiar(unique_names=users)) } can reliably receive court notices.
  % else:
  Give contact details where you can reliably receive court notices.
  % endif

  Email and phone are optional, but it helps to include the best contact
  information you use regularly.
fields:
  - Phone number: users[i].phone_number
    required: False
    help: |
      Use a number where you can receive calls or texts. We will format a
      10-digit number as XXX-XXX-XXXX.
  - Email address: users[i].email
    required: False
    help: |
      Use an email you check regularly.
validation code: |
  if users[i].phone_number:
    users[i].phone_number = fs_normalize_phone(users[i].phone_number)
---
id: user_address
sets:
  - users[i].user_address

question: |
  % if users.number_gathered() > 1:
  Address for ${ bold(users[i].familiar(unique_names=users)) }
  % else:
  Address for you
  % endif
subquestion: |
  Use the current mailing address.
  If mail is received somewhere else, enter the address where court mail should go.
fields:
  - Street address: users[i].address.address
    address autocomplete: True
  - City/Town: users[i].address.city
  - State: users[i].address.state
    default: MA
  - ZIP: users[i].address.zip
---
id: user_employment
sets:
  - users[i].user_employment

question: |
  % if users.number_gathered() > 1:
  Employment for ${ bold(users[i].familiar(unique_names=users)) }
  % else:
  Employment for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  If ${ bold(users[i].familiar(unique_names=users)) } is unemployed, you can leave these blank.

  If ${ bold(users[i].familiar(unique_names=users)) } is self-employed, you can enter a business name and role.
  % else:
  If you are unemployed, you can leave these blank.

  If you are self-employed, you can enter a business name and role.
  % endif
fields:
  - Employer name: users[i].employer_name
    required: False
  - Job title: users[i].job_title
    required: False
---
id: user_employer_address
question: |
  % if users.number_gathered() > 1:
  Employer address for ${ bold(users[i].familiar(unique_names=users)) }
  % else:
  Employer address for you
  % endif
subquestion: |
  Enter the employer's address and phone number if available.

  These fields are optional. Leave anything blank if you do not know it.
fields:
  - Street address: users[i].employer_address_street
    address autocomplete: True
    required: False
  - City/Town: users[i].employer_address_city
    required: False
  - State: users[i].employer_address_state
    default: MA
    required: False
  - ZIP: users[i].employer_address_zip
    required: False
  - Employer phone number: users[i].employer_phone
    required: False
    help: |
      Enter a 10-digit number if you have it. We will format it as
      XXX-XXX-XXXX.
validation code: |
  if users[i].employer_phone:
    users[i].employer_phone = fs_normalize_phone(users[i].employer_phone)
---
id: user_health_insurance
sets:
  - users[i].user_health_insurance

question: |
  % if users.number_gathered() > 1:
  Health insurance for ${ bold(users[i].familiar(unique_names=users)) }
  % else:
  Health insurance for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Include any health coverage ${ bold(users[i].familiar(unique_names=users)) } currently has.
  % else:
  Include any health coverage you currently have.
  % endif
  If coverage is through someone else, list the provider name if known.
fields:
  - label: |
      % if users.number_gathered() > 1:
      Does ${ bold(users[i].familiar(unique_names=users)) } have health insurance coverage?
      % else:
      Do you have health insurance coverage?
      % endif
    field: users[i].has_health_insurance
    datatype: yesno
  - Name of health insurance provider: users[i].health_insurance_provider
    show if:
      variable: users[i].has_health_insurance

      is: True
    required: False
---
id: financial_cadence_default
question: |
  % if users.number_gathered() > 1:
  How often is ${ bold(users[i].familiar(unique_names=users)) } paid?
  % else:
  How often are you paid?
  % endif
subquestion: |
  Most amounts will use this schedule. You can change it later for any item.

  % if users.number_gathered() > 1:
  **Example:** If ${ bold(users[i].familiar(unique_names=users)) } is paid every 2 weeks and the pay is $900 per check,
  choose "Every 2 weeks" and enter 900.
  % else:
  **Example:** If you are paid every 2 weeks and the pay is $900 per check,
  choose "Every 2 weeks" and enter 900.
  % endif

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Pay frequency: users[i].financial_cadence_default
    input type: radio
    code: |
      cadence_choices
    default: weekly
    help: |
      % if users.number_gathered() > 1:
      Choose the schedule that matches ${ bold(users[i].familiar(unique_names=users)) }'s main paycheck or most bills.
      % else:
      Choose the schedule that matches your main paycheck or most bills.
      % endif
---
id: fs_income_sources
generic object: ALIncomeList
question: |
  % if users.number_gathered() > 1:
  Gross income sources for ${ bold(x.statement_user.familiar(unique_names=users)) }
  % else:
  Gross income sources for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Choose all income sources ${ bold(x.statement_user.familiar(unique_names=users)) } receives.
  % else:
  Choose all income sources you receive.
  % endif
  The amount and frequency are entered on the next screen.
  If a category is missing, choose "Other income."
  If none apply, choose "None of the above."

  We will pause after the income section so you can review or edit it before
  you move on.
fields:
  - no label: x.selected_types
    datatype: checkboxes
    code: |
      fs_income_checkbox_terms_ordered
---
generic object: ALIncomeList
code: |
  x.selected_types
  x.move_checks_to_list(selected_terms=fs_income_terms)
  x.moved = True
---
id: fs_income_item
generic object: ALIncomeList
question: |
  % if users.number_gathered() > 1:
  Income details for ${ bold(x.statement_user.familiar(unique_names=users)) }
  % else:
  Income details for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Tell us about ${ bold(x.statement_user.familiar(unique_names=users)) }'s ${ ordinal(i) } income. Enter the amount for a single
  pay period and choose how often it is received. We will convert everything
  to a weekly amount for the court form.
  % else:
  Tell us about your ${ ordinal(i) } income. Enter the amount for a single
  pay period and choose how often it is received. We will convert everything
  to a weekly amount for the court form.
  % endif

  % if users.number_gathered() > 1:
  **Example:** If ${ bold(x.statement_user.familiar(unique_names=users)) } receives $300 monthly, enter 300 and choose "Monthly."
  % else:
  **Example:** If you receive $300 monthly, enter 300 and choose "Monthly."
  % endif

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Type of income: x[i].source
    code: |
      fs_income_terms_ordered
    default: other
  - Description (if needed): x[i].description
    required: False
  - Amount: x[i].value
    datatype: currency
  - label: |
      % if users.number_gathered() > 1:
      Use ${ bold(x.statement_user.familiar(unique_names=users)) }'s default cadence (${ x.statement_user.financial_cadence_default })
      % else:
      Use default cadence
      % endif
    field: x[i].use_default_cadence
    datatype: yesno
    default: True
  - How often do you receive this income?: x[i].times_per_year
    input type: radio
    code: |
      times_per_year_list
    default: cadence_to_times_per_year(x.statement_user.financial_cadence_default)
    show if:
      variable: x[i].use_default_cadence
      is: False
validation code: |
  if x[i].source == "other":
    x[i].display_name = fs_text_or_default(getattr(x[i], "description", ""), fs_income_terms.get(x[i].source, x[i].source))
  else:
    x[i].display_name = fs_income_terms.get(x[i].source, x[i].source)
  if hasattr(x[i], "use_default_cadence") and x[i].use_default_cadence:
    x[i].times_per_year = cadence_to_times_per_year(x.statement_user.financial_cadence_default)
---
generic object: ALIncomeList
code: |
  x.moved
  for income_item in x.elements:
    income_item.complete
  x.revisit = True
  x.gathered = True
---
generic object: ALIncomeList
table: x.table
rows: x
columns:
  - Type: |
      row_item.display_name if hasattr(row_item, "display_name") else row_item.source
  - Amount per month: |
      currency(row_item.total(times_per_year=12))
edit:
  - source

  - value

  - times_per_year

---
id: fs_income_revisit
generic object: ALIncomeList
continue button field: x.revisit
question: |
  Edit income
subquestion: |
  ${ x.table }

  Look over your entries. If something is missing, use "Add another" to include
  more income sources.

  ${ x.add_action() }
---
id: fs_expense_sources
generic object: ALExpenseList
question: |
  % if users.number_gathered() > 1:
  Expense categories for ${ bold(x.statement_user.familiar(unique_names=users)) }
  % else:
  Expense categories for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Choose the expense categories that apply to ${ bold(x.statement_user.familiar(unique_names=users)) }'s household.
  % else:
  Choose the expense categories that apply to your household.
  % endif

  Amounts and frequency are entered on the next screen. If a category is missing,
  choose "Other."

  We will pause after the expenses section so you can review or edit it before
  you move on.
fields:
  - no label: x.selected_types
    datatype: checkboxes
    code: |
      fs_expense_checkbox_terms_ordered
---
generic object: ALExpenseList
code: |
  x.selected_types
  x.move_checks_to_list(selected_terms=fs_expense_terms)
  x.moved = True
---
id: fs_expense_item
generic object: ALExpenseList
question: |
  % if users.number_gathered() > 1:
  Expense details for ${ bold(x.statement_user.familiar(unique_names=users)) }
  % else:
  Expense details for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Tell us about ${ bold(x.statement_user.familiar(unique_names=users)) }'s ${ ordinal(i) } expense. Enter the amount for a single
  payment and how often it is paid. We will convert everything to weekly totals.
  % else:
  Tell us about your ${ ordinal(i) } expense. Enter the amount for a single
  payment and how often it is paid. We will convert everything to weekly totals.
  % endif

  % if users.number_gathered() > 1:
  **Example:** If ${ bold(x.statement_user.familiar(unique_names=users)) }'s rent is $1,200 per month, enter 1200 and choose "Monthly."
  % else:
  **Example:** If your rent is $1,200 per month, enter 1200 and choose "Monthly."
  % endif

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Type of expense: x[i].source
    code: |
      fs_expense_terms_ordered
    default: other
  - Description (if needed): x[i].description
    required: False
  - Amount: x[i].value
    datatype: currency
  - label: |
      % if users.number_gathered() > 1:
      Use ${ bold(x.statement_user.familiar(unique_names=users)) }'s default cadence (${ x.statement_user.financial_cadence_default })
      % else:
      Use default cadence
      % endif
    field: x[i].use_default_cadence
    datatype: yesno
    default: True
  - How often do you pay this amount?: x[i].times_per_year
    input type: radio
    code: |
      times_per_year_for_expenses
    default: cadence_to_times_per_year(x.statement_user.financial_cadence_default)
    show if:
      variable: x[i].use_default_cadence
      is: False
validation code: |
  if x[i].source in ("other", "employment_other"):
    x[i].display_name = fs_text_or_default(getattr(x[i], "description", ""), fs_expense_terms.get(x[i].source, x[i].source))
  else:
    x[i].display_name = fs_expense_terms.get(x[i].source, x[i].source)
  if hasattr(x[i], "use_default_cadence") and x[i].use_default_cadence:
    x[i].times_per_year = cadence_to_times_per_year(x.statement_user.financial_cadence_default)
