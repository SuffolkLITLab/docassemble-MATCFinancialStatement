  Party names
subquestion: |
  Use legal names as they appear on court paperwork.

  If you do not know the other party's information yet, you can leave those
  fields blank for now.
fields:
  - Your first name: fs_user.name.first
  - Your last name: fs_user.name.last
  - Other party first name: fs_other_user.name.first
  - Other party last name: fs_other_user.name.last
---
id: user_personal_info
sets:
  - user_personal_info
question: |
  Personal information
subquestion: |
  We ask about children to match the court form. If you do not have children,
  leave the count at 0.

  Your Social Security number is optional. Enter only the last 4 digits.
fields:
  - Social Security number (last 4 digits): user_ssn
    required: False
    maxlength: 4
    help: |
      Optional. Enter only the last 4 digits (example: 1234).
  - Date of birth: fs_user.birthdate
    datatype: date
    help: |
      Use month/day/year format.
  - Do you have any children?: user_has_children
    datatype: yesno
  - Number of children living with you: children_living_with_user_count
    datatype: integer
    required: False
    min: 0
    show if:
      variable: user_has_children
      is: True
  - Occupation: user_occupation
    required: False
---
code: |
  if defined("user_has_children") and not user_has_children:
    children_living_with_user_count = 0
---
