id: income_totals
continue button field: income_totals
question: |
  Income summary
subquestion: |
  We will convert your amounts to weekly values for the financial statement.
  You can still go back and edit any income source before you download.

  Total gross weekly income (current): ${ currency(income_total_weekly) }
---
code: |
  fs_log("income_totals")
  # Normalize mixed Decimal/float totals before arithmetic.
  income_total_weekly = fs_safe_float(income_list.total(times_per_year=52))

  if defined("schedule_a_weekly_business_income"):
    income_self_employment_weekly = fs_safe_float(schedule_a_weekly_business_income)
  else:
    income_self_employment_weekly = 0

  if defined("schedule_b_weekly_rental_income"):
    income_rental_weekly = fs_safe_float(schedule_b_weekly_rental_income)
  else:
    income_rental_weekly = 0

  income_total_weekly = (
    income_total_weekly
    + income_self_employment_weekly
    + income_rental_weekly
  )

  fs_has_any_income_entries = (
    len(income_list) > 0
    or has_self_employment_income
    or has_rental_income
  )
  income_requires_confirmation = (
    (not fs_has_any_income_entries)
    or income_total_weekly == 0
  )
---
