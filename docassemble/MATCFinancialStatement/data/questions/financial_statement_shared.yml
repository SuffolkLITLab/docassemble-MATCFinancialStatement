  Motor vehicle details
subquestion: |
  Enter the best information you have. Estimates are fine if exact values
  are not available.

  You can leave any detail blank that you do not know.
fields:
  - Type: motor_vehicles[i].vehicle_type
    required: False
  - Make: motor_vehicles[i].make
