code: |
  nav.set_sections(al_nav_sections)
  ma1a_apply_portable_schema
  nav.set_section("introduction")
  set_progress(5)
  fs_intro

  nav.set_section("eligibility")
  set_progress(15)
  gross_annual_income
  financial_form_type

  nav.set_section("court_and_parties")
  set_progress(25)
  financial_statement_court_division
  docket_number
  users[0].name.first
  other_parties[0].name.first
  fs_checkpoint_court_and_parties

  nav.set_section("personal_information")
  set_progress(35)
  users[0].birthdate
  users[0].phone_number
  users[0].address.address
  user_employer_name
  if user_employer_name or user_job_title:
    user_employer_address_street
  user_has_health_insurance
  fs_checkpoint_personal_information

  nav.set_section("cadence")
  set_progress(45)
  financial_cadence_default

  nav.set_section("income")
  set_progress(55)
  income_list.gathered
  income_schedule_triggers

  if has_self_employment_income:
    schedule_a_sections
  if has_rental_income:
    schedule_b_sections
  income_totals
  income_explanation
  if income_requires_confirmation:
    confirm_no_income_screen
  fs_checkpoint_income

  if financial_form_type == "short":
    short_form_sections
  else:
    long_form_sections

  nav.set_section("review")
  set_progress(95)
  fs_review

  nav.set_section("download")
  set_progress(100)
  ma1a_export_portable_schema
  fs_download

  interview_order_financial_statement = True
