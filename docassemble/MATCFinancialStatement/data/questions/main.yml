---
initial: True
code: |
  def _to_weekly_safe(var_name):
    try:
      amt = value(var_name) if defined(var_name) else 0
      return to_weekly(amt, financial_cadence_default) if amt else 0
    except:
      return 0

  def _short_expense_weekly(source_key):
    try:
      return expense_list.total(times_per_year=52, source=source_key)
    except:
      return 0

  def fs_expense_descriptions(items, source_key):
    try:
      descriptions = []
      for item in items:
        if fs_item_value(item, "source") != source_key:
          continue
        description = fs_text_or_default(fs_item_value(item, "description"))
        if description:
          descriptions.append(description)
    except Exception:
      return ""
    return "; ".join(descriptions)
