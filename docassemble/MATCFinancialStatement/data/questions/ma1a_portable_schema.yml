---
comment: |
  Adapter between the package-level MA 1A / Portable schema and the
  standalone financial-statement interview.

  The shared 1A package uses petitioners[0] and petitioners[1]. This
  standalone interview keeps users[0] for the person completing the financial
  statement and other_parties[0] for the other spouse/party.

  Do not map financial-statement children to children_of_marriage. Financial
  statements can include household/dependent child facts that do not belong on
  the petition or separation agreement.
