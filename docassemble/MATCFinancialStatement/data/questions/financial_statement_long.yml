  - Equity: fs_user.long_secondary_real_estate_equity
    datatype: currency
    required: False
---
code: |
  _long_re_primary = (
    fs_safe_float(value("fs_user.long_primary_real_estate_equity"))
    if defined("fs_user.long_primary_real_estate_equity")
    and value("fs_user.long_primary_real_estate_equity") not in (None, "")
    else 0.0
  )
  _long_re_secondary = (
    fs_safe_float(value("fs_user.long_secondary_real_estate_equity"))
    if defined("fs_user.long_secondary_real_estate_equity")
    and value("fs_user.long_secondary_real_estate_equity") not in (None, "")
    else 0.0
  )
  _long_vehicles = fs_sum_list_attr(fs_user.motor_vehicles, "equity") if defined("fs_user.motor_vehicles") else 0.0
  _long_pensions = 0.0
  if defined("fs_user.pensions"):
    _long_pensions = (
      fs_sum_list_attr(fs_user.pensions, "defined_benefit_amount")
      + fs_sum_list_attr(fs_user.pensions, "defined_contribution_amount")
    )
  _long_other = fs_sum_list_attr(fs_user.other_assets, "current_balance") if defined("fs_user.other_assets") else 0.0
  fs_user.long_assets_total_value = currency(
    _long_re_primary
    + _long_re_secondary
    + _long_vehicles
    + _long_pensions
    + _long_other
  )
---
