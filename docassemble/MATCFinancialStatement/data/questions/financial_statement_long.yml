---
objects:
  - users[i].long_expense_list: ALExpenseList.using(auto_gather=False)
  - long_expense_terms_ordered: DAOrderedDict.using(elements=long_expense_terms, auto_gather=False, gathered=True)
  - long_expense_checkbox_terms_ordered: DAOrderedDict.using(elements=long_expense_checkbox_terms, auto_gather=False, gathered=True)
---
id: long_form_sections
sets:
  - fs_user.long_form_sections

code: |
  nav.set_section("deductions")
  set_progress(60)
  fs_user.long_deductions
  fs_user.long_net_income
  fs_user.long_prior_year
  fs_user.fs_checkpoint_deductions
  nav.set_section("expenses")
  set_progress(70)
  fs_user.long_expense_list.gathered
  fs_user.long_expenses_total
  if fs_user.long_expenses_require_confirmation:
    fs_user.confirm_no_expenses_long_screen
  fs_user.fs_checkpoint_expenses
  nav.set_section("assets")
  set_progress(80)
  fs_user.long_counsel_fees
  fs_user.long_real_estate_primary
  fs_user.long_real_estate_secondary
  fs_user.motor_vehicles.gather()
  fs_user.pensions.gather()
  fs_user.other_assets.gather()
  fs_user.long_assets_total
  fs_user.fs_checkpoint_assets
  nav.set_section("liabilities")
  set_progress(90)
  fs_user.liabilities.gather()
  fs_user.long_liabilities_total
  fs_user.long_certification
  fs_user.long_notary
  fs_user.attorney_statement
  fs_user.fs_checkpoint_liabilities
  fs_user.long_form_sections = True
---
id: long_expense_sources
generic object: ALExpenseList
question: |
  Expense categories
subquestion: |
  Choose the expense categories that apply to your household.

  You will enter the amount and how often you pay it on the next screen.
  If a category is missing, choose "Other."

  We will pause after the expenses section so you can review or edit it before
  you move on.
fields:
  - no label: x.selected_types
    datatype: checkboxes
    code: |
      long_expense_checkbox_terms_ordered
---
generic object: ALExpenseList
code: |
  x.selected_types
  x.move_checks_to_list(selected_terms=long_expense_terms)
  x.moved = True
---
id: long_expense_item
generic object: ALExpenseList
question: |
  Expense details
subquestion: |
  Tell us about your ${ ordinal(i) } expense. Enter the amount for a single
  payment and how often you pay it. We will convert everything to weekly totals.

  **Example:** If your electricity is $120 monthly, enter 120 and choose "Monthly."

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Type of expense: x[i].source
    code: |
      long_expense_terms_ordered
    default: other
  - Description (if needed): x[i].description
    required: False
  - Amount: x[i].value
    datatype: currency
  - How often do you pay this amount?: x[i].times_per_year
    input type: radio
    code: |
      times_per_year_for_expenses
    default: cadence_to_times_per_year(value("fs_user.financial_cadence_default") if defined("fs_user.financial_cadence_default") else "weekly")
validation code: |
  if x[i].source in ("employment_other", "other"):
    x[i].display_name = fs_text_or_default(getattr(x[i], "description", ""), long_expense_terms.get(x[i].source, x[i].source))
  else:
    x[i].display_name = long_expense_terms.get(x[i].source, x[i].source)
---
generic object: ALExpenseList
code: |
  x.moved
  for expense in x.elements:
    expense.value
  x.revisit = True
  x.gathered = True
---
generic object: ALExpenseList
table: x.table
rows: x
columns:
  - Type: |
      row_item.display_name if hasattr(row_item, "display_name") else row_item.source
  - Amount per month: |
      currency(row_item.total(times_per_year=12))
edit:
  - source

  - value

  - times_per_year

---
id: long_expense_revisit
generic object: ALExpenseList
continue button field: x.revisit
question: |
  Edit expenses
subquestion: |
  ${ x.table }

  Look over your entries. If something is missing, use "Add another" to include
  more expenses.

  ${ x.add_action() }
---
id: long_deductions
sets:
  - fs_user.long_deductions

continue button field: fs_user.long_deductions
question: |
  Deductions from gross income
subquestion: |
  Enter the amount taken out in one pay period for each line.
  Use your chosen cadence (${ fs_user.financial_cadence_default }).
  These are amounts withheld from your gross pay.

  ${ collapse_template(fs_estimate_help) }
fields:
  - Federal tax withholding/estimated payments: fs_user.long_deduction_federal
    datatype: currency
    required: False
  - Federal withholding allowances claimed: fs_user.long_federal_allowances
    datatype: integer
    required: False
    min: 0
  - State tax withholding/estimated payments: fs_user.long_deduction_state
    datatype: currency
    required: False
  - State withholding allowances claimed: fs_user.long_state_allowances
    datatype: integer
    required: False
    min: 0
  - F.I.C.A.: fs_user.long_deduction_fica
    datatype: currency
    required: False
  - Medicare: fs_user.long_deduction_medicare
    datatype: currency
    required: False
  - Medical insurance: fs_user.long_deduction_medical
    datatype: currency
    required: False
  - Dental insurance: fs_user.long_deduction_dental
    datatype: currency
    required: False
  - Vision insurance: fs_user.long_deduction_vision
    datatype: currency
    required: False
  - Union dues: fs_user.long_deduction_union
    datatype: currency
    required: False
  - Child support: fs_user.long_deduction_child_support
    datatype: currency
    required: False
  - Spousal support: fs_user.long_deduction_spousal_support
    datatype: currency
    required: False
  - Retirement: fs_user.long_deduction_retirement
    datatype: currency
    required: False
  - Savings: fs_user.long_deduction_savings
    datatype: currency
    required: False
  - Deferred compensation: fs_user.long_deduction_deferred_comp
    datatype: currency
    required: False
  - Credit union (loan): fs_user.long_deduction_credit_union_loan
    datatype: currency
    required: False
  - Credit union (savings): fs_user.long_deduction_credit_union_savings
    datatype: currency
    required: False
  - Charitable contributions: fs_user.long_deduction_charity
    datatype: currency
    required: False
  - Life insurance: fs_user.long_deduction_life_insurance
    datatype: currency
    required: False
  - Other (specify): fs_user.long_deduction_other_description
    required: False
  - Other amount: fs_user.long_deduction_other_amount
    datatype: currency
    required: False
---
code: |
  fs_user.long_deductions_total_weekly = (
    to_weekly(value("fs_user.long_deduction_federal"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_state"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_fica"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_medicare"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_medical"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_dental"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_vision"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_union"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_child_support"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_spousal_support"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_retirement"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_savings"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_deferred_comp"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_credit_union_loan"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_credit_union_savings"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_charity"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_life_insurance"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.long_deduction_other_amount"), fs_user.financial_cadence_default)
  )
---
id: long_net_income
continue button field: fs_user.long_net_income
question: |
  Net weekly income
subquestion: |
  Total gross weekly income: ${ currency(fs_user.income_total_weekly) }

  Total weekly deductions: ${ currency(fs_user.long_deductions_total_weekly) }

  Net weekly income: ${ currency(float(fs_user.income_total_weekly) - float(fs_user.long_deductions_total_weekly)) }

  This is your income after deductions.
---
code: |
  fs_user.long_net_weekly_income = float(fs_user.income_total_weekly) - float(fs_user.long_deductions_total_weekly)
---
