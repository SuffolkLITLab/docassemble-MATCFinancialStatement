data: !!omap
  - rent: "Rent"
  - mortgage: "Mortgage (principal, interest, taxes, insurance if escrowed)"
  - property_tax: "Property taxes and assessments"
  - home_insurance: "Homeowner or tenant insurance"
  - maintenance_fees: "Maintenance fees or condo fees"
  - heat: "Heat"
  - electric: "Electricity"
  - gas: "Propane or natural gas"
  - phone: "Telephone"
  - water: "Water and sewer"
  - food: "Food"
  - supplies: "House supplies"
  - laundry: "Laundry"
  - dry_cleaning: "Dry cleaning"
  - clothing: "Clothing"
  - life_insurance: "Life insurance"
  - medical_insurance: "Medical insurance"
  - dental_insurance: "Dental insurance"
  - vision_insurance: "Vision insurance"
  - uninsured_medical: "Uninsured medical"
  - uninsured_dental: "Uninsured dental"
  - motor_vehicle: "Motor vehicle expenses"
  - fuel: "Fuel"
  - vehicle_insurance: "Motor vehicle insurance"
  - vehicle_maintenance: "Motor vehicle maintenance"
  - loan_payments: "Loan payment(s)"
  - entertainment: "Entertainment"
  - vacation: "Vacation"
  - cable: "Cable TV"
