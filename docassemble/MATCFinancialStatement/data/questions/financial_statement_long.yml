  - charity: "Charitable contributions"
  - child_allowance: "Child(ren)'s allowance"
  - visitation_travel: "Extraordinary travel for visitation"
  - other: "Other"
---
variable name: long_expense_checkbox_terms
data: !!omap
  - rent: "I pay rent"
  - mortgage: "I pay a mortgage (principal, interest, taxes, insurance if escrowed)"
  - property_tax: "I pay property taxes or assessments"
  - home_insurance: "I pay for homeowner or tenant insurance"
  - maintenance_fees: "I pay maintenance fees or condo fees"
  - heat: "I pay for heat"
  - electric: "I pay for electricity"
  - gas: "I pay for propane or natural gas"
  - phone: "I pay for telephone service"
  - water: "I pay for water or sewer"
  - food: "I pay for food"
  - supplies: "I pay for house supplies"
  - laundry: "I pay for laundry"
  - dry_cleaning: "I pay for dry cleaning"
  - clothing: "I pay for clothing"
  - life_insurance: "I pay for life insurance"
  - medical_insurance: "I pay for medical insurance"
  - dental_insurance: "I pay for dental insurance"
  - vision_insurance: "I pay for vision insurance"
  - uninsured_medical: "I pay uninsured medical expenses"
  - uninsured_dental: "I pay uninsured dental expenses"
  - motor_vehicle: "I pay motor vehicle expenses"
  - fuel: "I pay for fuel"
  - vehicle_insurance: "I pay for motor vehicle insurance"
  - vehicle_maintenance: "I pay for motor vehicle maintenance"
  - loan_payments: "I make loan payments"
  - entertainment: "I pay entertainment expenses"
  - vacation: "I pay vacation expenses"
  - cable: "I pay for cable TV"
  - child_support: "I pay child support"
  - child_day_care: "I pay child care expenses"
  - child_education: "I pay child education expenses"
  - education_self: "I pay my own education expenses"
  - uniforms: "I pay for employment-related uniforms"
  - employment_travel: "I pay employment-related travel expenses"
  - continuing_education: "I pay employment continuing education expenses"
  - employment_other: "I pay other employment expenses"
  - lottery: "I buy lottery tickets"
  - charity: "I make charitable contributions"
  - child_allowance: "I pay a child allowance"
  - visitation_travel: "I pay extraordinary travel costs for visitation"
  - other: "I have other expenses"
---
objects:
  - users[i].long_expense_list: ALExpenseList.using(auto_gather=False)
  - long_expense_terms_ordered: DAOrderedDict.using(elements=long_expense_terms, auto_gather=False, gathered=True)
  - long_expense_checkbox_terms_ordered: DAOrderedDict.using(elements=long_expense_checkbox_terms, auto_gather=False, gathered=True)
---
id: long_form_sections
sets:
  - users[i].long_form_sections

code: |
  nav.set_section("deductions")
  set_progress(60)
  users[i].long_deductions
  users[i].long_net_income
  users[i].long_prior_year
  users[i].fs_checkpoint_deductions
  nav.set_section("expenses")
  set_progress(70)
  users[i].long_expense_list.statement_user = users[i]
  users[i].long_expense_list.gathered
  users[i].long_expenses_total
  if users[i].long_expenses_require_confirmation:
    users[i].confirm_no_expenses_long_screen
  users[i].fs_checkpoint_expenses
  nav.set_section("assets")
  set_progress(80)
  users[i].long_counsel_fees
  users[i].long_real_estate_primary
  users[i].long_real_estate_secondary
  users[i].motor_vehicles.gather()
  users[i].pensions.gather()
  users[i].other_assets.gather()
  users[i].long_assets_total
  users[i].fs_checkpoint_assets
  nav.set_section("liabilities")
  set_progress(90)
  users[i].liabilities.gather()
  users[i].long_liabilities_total
  users[i].long_certification
  users[i].long_notary
  users[i].attorney_statement
  users[i].fs_checkpoint_liabilities
  users[i].long_form_sections = True
---
id: long_expense_sources
generic object: ALExpenseList
question: |
  % if users.number_gathered() > 1:
  Expense categories for ${ bold(x.statement_user.familiar(unique_names=users)) }
  % else:
  Expense categories for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Choose the expense categories that apply to ${ bold(x.statement_user.familiar(unique_names=users)) }'s household.
  % else:
  Choose the expense categories that apply to your household.
  % endif

  You will enter the amount and how often you pay it on the next screen.
  If a category is missing, choose "Other."

  We will pause after the expenses section so you can review or edit it before
  you move on.
fields:
  - no label: x.selected_types
    datatype: checkboxes
    code: |
      long_expense_checkbox_terms_ordered
---
generic object: ALExpenseList
code: |
  x.selected_types
  x.move_checks_to_list(selected_terms=long_expense_terms)
  x.moved = True
---
id: long_expense_item
generic object: ALExpenseList
question: |
  % if users.number_gathered() > 1:
  Expense details for ${ bold(x.statement_user.familiar(unique_names=users)) }
  % else:
  Expense details for you
  % endif
subquestion: |
  % if users.number_gathered() > 1:
  Tell us about ${ bold(x.statement_user.familiar(unique_names=users)) }'s ${ ordinal(i) } expense. Enter the amount for a single
  payment and how often it is paid. We will convert everything to weekly totals.
  % else:
  Tell us about your ${ ordinal(i) } expense. Enter the amount for a single
  payment and how often you pay it. We will convert everything to weekly totals.
  % endif

  % if users.number_gathered() > 1:
  **Example:** If ${ bold(x.statement_user.familiar(unique_names=users)) }'s electricity is $120 monthly, enter 120 and choose "Monthly."
  % else:
  **Example:** If your electricity is $120 monthly, enter 120 and choose "Monthly."
  % endif

  ${ collapse_template(fs_amount_entry_help) }
fields:
  - Type of expense: x[i].source
    code: |
      long_expense_terms_ordered
    default: other
  - Description (if needed): x[i].description
    required: False
  - Amount: x[i].value
    datatype: currency
  - How often do you pay this amount?: x[i].times_per_year
    input type: radio
    code: |
      times_per_year_for_expenses
    default: cadence_to_times_per_year(x.statement_user.financial_cadence_default)
validation code: |
  if x[i].source in ("employment_other", "other"):
    x[i].display_name = fs_text_or_default(getattr(x[i], "description", ""), long_expense_terms.get(x[i].source, x[i].source))
  else:
    x[i].display_name = long_expense_terms.get(x[i].source, x[i].source)
---
generic object: ALExpenseList
code: |
  x.moved
  for expense in x.elements:
    expense.value
  x.revisit = True
  x.gathered = True
---
generic object: ALExpenseList
table: x.table
rows: x
columns:
  - Type: |
      row_item.display_name if hasattr(row_item, "display_name") else row_item.source
  - Amount per month: |
      currency(row_item.total(times_per_year=12))
edit:
  - source

  - value

  - times_per_year

---
id: long_expense_revisit
generic object: ALExpenseList
continue button field: x.revisit
question: |
  Edit expenses
subquestion: |
  ${ x.table }

  Look over your entries. If something is missing, use "Add another" to include
  more expenses.

  ${ x.add_action() }
---
id: long_deductions
sets:
  - users[i].long_deductions

continue button field: users[i].long_deductions
question: |
  Deductions from gross income
subquestion: |
  Enter the amount taken out in one pay period for each line.
  Use your chosen cadence (${ users[i].financial_cadence_default }).
  These are amounts withheld from your gross pay.

  ${ collapse_template(fs_estimate_help) }
fields:
  - Federal tax withholding/estimated payments: users[i].long_deduction_federal
    datatype: currency
    required: False
  - Federal withholding allowances claimed: users[i].long_federal_allowances
    datatype: integer
    required: False
    min: 0
  - State tax withholding/estimated payments: users[i].long_deduction_state
    datatype: currency
    required: False
  - State withholding allowances claimed: users[i].long_state_allowances
    datatype: integer
    required: False
    min: 0
  - F.I.C.A.: users[i].long_deduction_fica
    datatype: currency
    required: False
  - Medicare: users[i].long_deduction_medicare
    datatype: currency
    required: False
  - Medical insurance: users[i].long_deduction_medical
    datatype: currency
    required: False
  - Dental insurance: users[i].long_deduction_dental
    datatype: currency
    required: False
  - Vision insurance: users[i].long_deduction_vision
    datatype: currency
    required: False
  - Union dues: users[i].long_deduction_union
    datatype: currency
    required: False
  - Child support: users[i].long_deduction_child_support
    datatype: currency
    required: False
  - Spousal support: users[i].long_deduction_spousal_support
    datatype: currency
    required: False
  - Retirement: users[i].long_deduction_retirement
    datatype: currency
    required: False
  - Savings: users[i].long_deduction_savings
    datatype: currency
    required: False
  - Deferred compensation: users[i].long_deduction_deferred_comp
    datatype: currency
    required: False
  - Credit union (loan): users[i].long_deduction_credit_union_loan
    datatype: currency
    required: False
  - Credit union (savings): users[i].long_deduction_credit_union_savings
    datatype: currency
    required: False
  - Charitable contributions: users[i].long_deduction_charity
    datatype: currency
    required: False
  - Life insurance: users[i].long_deduction_life_insurance
    datatype: currency
    required: False
  - Other (specify): users[i].long_deduction_other_description
    required: False
  - Other amount: users[i].long_deduction_other_amount
    datatype: currency
    required: False
---
code: |
  users[i].long_deductions_total_weekly = (
    to_weekly(value("users[i].long_deduction_federal"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_state"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_fica"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_medicare"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_medical"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_dental"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_vision"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_union"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_child_support"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_spousal_support"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_retirement"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_savings"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_deferred_comp"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_credit_union_loan"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_credit_union_savings"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_charity"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_life_insurance"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].long_deduction_other_amount"), users[i].financial_cadence_default)
  )
---
id: long_net_income
continue button field: users[i].long_net_income
question: |
  Net weekly income
subquestion: |
  Total gross weekly income: ${ currency(users[i].income_total_weekly) }

  Total weekly deductions: ${ currency(users[i].long_deductions_total_weekly) }

  Net weekly income: ${ currency(float(users[i].income_total_weekly) - float(users[i].long_deductions_total_weekly)) }

  This is your income after deductions.
---
code: |
  users[i].long_net_weekly_income = float(users[i].income_total_weekly) - float(users[i].long_deductions_total_weekly)
---
id: long_prior_year
sets:
  - users[i].long_prior_year

continue button field: users[i].long_prior_year
question: |
  Prior year income
subquestion: |
  % if users.number_gathered() > 1:
  Use ${ bold(users[i].familiar(unique_names=users)) }'s most recent tax year or best estimate.
  % else:
  Use your most recent tax year or best estimate.
  % endif

  ${ collapse_template(fs_estimate_help) }
fields:
  - Gross income from prior year: users[i].prior_year_gross_amount
    datatype: currency
    required: False
  - Number of years paid into Social Security: users[i].years_paid_into_social_security
    datatype: integer
    required: False
    min: 0
