---
id: confirm_no_expenses_long_screen
continue button field: users[i].confirm_no_expenses_long_screen
question: |
  Confirm no expenses
subquestion: |
  You entered $0 for expenses.

  Choose "Yes" only if you truly do not have household expenses to list.
fields:
  - Yes, I do not have household expenses to list right now: users[i].confirm_no_expenses_long
    datatype: yesnoradio
    required: True
---
code: |
  users[i].long_expenses_require_confirmation = users[i].long_expenses_total_weekly == 0
---
id: long_counsel_fees
sets:
  - users[i].long_counsel_fees

continue button field: users[i].long_counsel_fees
question: |
  Counsel fees
subquestion: |
  Fill out this section only if you have an attorney.

  % if users.number_gathered() > 1:
  If ${ bold(users[i].familiar(unique_names=users)) } does not have an attorney, you can leave every field on this page blank.
  % else:
  If you do not have an attorney, you can leave every field on this page blank.
  % endif
fields:
  - Retainer amount(s) paid to your attorney(s): users[i].long_counsel_retainer
    datatype: currency
    required: False
  - Legal fees incurred so far against retainer(s): users[i].long_counsel_fees_incurred
    datatype: currency
    required: False
  - Anticipated total legal expense (minimum): users[i].long_counsel_range_min
    datatype: currency
    required: False
  - Anticipated total legal expense (maximum): users[i].long_counsel_range_max
    datatype: currency
    required: False
---
id: long_real_estate_primary
sets:
  - users[i].long_real_estate_primary

continue button field: users[i].long_real_estate_primary
question: |
  Real estate - primary residence
subquestion: |
  % if users.number_gathered() > 1:
  If ${ bold(users[i].familiar(unique_names=users)) } does not own real estate, you can leave these blank.
  % else:
  If you do not own real estate, you can leave these blank.
  % endif

  Use the best values you have for assessed value, market value, mortgage
  balances, and equity.
fields:
  - Street address: users[i].long_primary_real_estate_address
    required: False
  - City/Town: users[i].long_primary_real_estate_city
    required: False
  - State: users[i].long_primary_real_estate_state
    default: MA
    required: False
  - Title held in name of: users[i].long_primary_real_estate_title
    required: False
  - Purchase price: users[i].long_primary_real_estate_purchase_price
    datatype: currency
    required: False
  - Year of purchase: users[i].long_primary_real_estate_purchase_year
    datatype: integer
    required: False
  - Current assessed value: users[i].long_primary_real_estate_assessed_value
    datatype: currency
    required: False
  - Date of last assessment: users[i].long_primary_real_estate_assessment_date
    datatype: date
    required: False
  - Fair market value: users[i].long_primary_real_estate_fmv
    datatype: currency
    required: False
  - Outstanding 1st mortgage: users[i].long_primary_real_estate_first_mortgage
    datatype: currency
    required: False
  - Outstanding 2nd mortgage or home equity loan: users[i].long_primary_real_estate_second_mortgage
    datatype: currency
    required: False
  - Equity: users[i].long_primary_real_estate_equity
    datatype: currency
    required: False
