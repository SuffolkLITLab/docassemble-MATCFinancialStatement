id: long_real_estate_secondary
sets:
  - users[i].long_real_estate_secondary

continue button field: users[i].long_real_estate_secondary
question: |
  Real estate - vacation or second home
subquestion: |
  % if users.number_gathered() > 1:
  Leave blank if ${ bold(users[i].familiar(unique_names=users)) } does not own a vacation home or second property.
  % else:
  Leave blank if you do not own a vacation home or second property.
  % endif

  Use estimates if you do not have the exact values in front of you.
fields:
  - Street address: users[i].long_secondary_real_estate_address
    required: False
  - City/Town: users[i].long_secondary_real_estate_city
    required: False
  - State: users[i].long_secondary_real_estate_state
    default: MA
    required: False
  - Title held in name of: users[i].long_secondary_real_estate_title
    required: False
  - Purchase price: users[i].long_secondary_real_estate_purchase_price
    datatype: currency
    required: False
  - Year of purchase: users[i].long_secondary_real_estate_purchase_year
    datatype: integer
    required: False
  - Current assessed value: users[i].long_secondary_real_estate_assessed_value
    datatype: currency
    required: False
  - Date of last assessment: users[i].long_secondary_real_estate_assessment_date
    datatype: date
    required: False
  - Fair market value: users[i].long_secondary_real_estate_fmv
    datatype: currency
    required: False
  - Outstanding 1st mortgage: users[i].long_secondary_real_estate_first_mortgage
    datatype: currency
    required: False
  - Outstanding 2nd mortgage or home equity loan: users[i].long_secondary_real_estate_second_mortgage
    datatype: currency
    required: False
  - Equity: users[i].long_secondary_real_estate_equity
    datatype: currency
    required: False
---
code: |
  _long_re_primary = (
    fs_safe_float(value("users[i].long_primary_real_estate_equity"))
    if defined("users[i].long_primary_real_estate_equity")
    and value("users[i].long_primary_real_estate_equity") not in (None, "")
    else 0.0
  )
  _long_re_secondary = (
    fs_safe_float(value("users[i].long_secondary_real_estate_equity"))
    if defined("users[i].long_secondary_real_estate_equity")
    and value("users[i].long_secondary_real_estate_equity") not in (None, "")
    else 0.0
  )
  _long_vehicles = fs_sum_list_attr(users[i].motor_vehicles, "equity") if defined("users[i].motor_vehicles") else 0.0
  _long_pensions = 0.0
  if defined("users[i].pensions"):
    _long_pensions = (
      fs_sum_list_attr(users[i].pensions, "defined_benefit_amount")
      + fs_sum_list_attr(users[i].pensions, "defined_contribution_amount")
    )
  _long_other = fs_sum_list_attr(users[i].other_assets, "current_balance") if defined("users[i].other_assets") else 0.0
  users[i].long_assets_total_value = currency(
    _long_re_primary
    + _long_re_secondary
    + _long_vehicles
    + _long_pensions
    + _long_other
  )
---
id: long_assets_total
continue button field: users[i].long_assets_total
question: |
  Assets summary
subquestion: |
  Here is a quick summary of the assets you listed:

  - **Motor vehicles:** ${ len(users[i].motor_vehicles) if defined('users[i].motor_vehicles') and users[i].motor_vehicles.there_are_any else 0 }
  - **Retirement plans:** ${ len(users[i].pensions) if defined('users[i].pensions') and users[i].pensions.there_are_any else 0 }
  - **Other assets:** ${ len(users[i].other_assets) if defined('users[i].other_assets') and users[i].other_assets.there_are_any else 0 }

  Use **Back** if you want to make changes before the form is generated.
---
id: long_liabilities_total
continue button field: users[i].long_liabilities_total
question: |
  Liabilities summary
subquestion: |
  **Liabilities listed:** ${ len(users[i].liabilities) if defined('users[i].liabilities') and users[i].liabilities.there_are_any else 0 }

  Use **Back** if you want to add or edit debts before finishing.
---
code: |
  _long_liab_due = fs_sum_list_attr(users[i].liabilities, "amount_due") if defined("users[i].liabilities") else 0.0
  _long_liab_weekly = fs_sum_list_attr(users[i].liabilities, "weekly_payment") if defined("users[i].liabilities") else 0.0
  users[i].long_liabilities_total_amount_due = currency(_long_liab_due)
  users[i].long_liabilities_total_weekly_payment = currency(_long_liab_weekly)
---
id: long_certification
sets:
  - users[i].long_certification

continue button field: users[i].long_certification
question: |
  Certification
subquestion: |
  Sign to certify that the information you provided is true to the best of
  % if users.number_gathered() > 1:
  ${ bold(users[i].familiar(unique_names=users)) }'s knowledge.
  % else:
  your knowledge.
  % endif

  % if users.number_gathered() > 1:
  Enter ${ bold(users[i].familiar(unique_names=users)) }'s signature and the date the statement is being signed.
  % else:
  Enter your signature and the date you are signing this statement.
  % endif
fields:
  - Signature: users[i].user_signature
    required: False
  - Signature date: users[i].user_signature_date
    datatype: date
    required: False
---
id: long_notary
sets:
  - users[i].long_notary

continue button field: users[i].long_notary
question: |
  Notary
subquestion: |
  Fill this out only if you are completing the notarization right now.

  If the statement will be notarized later, leave this page blank for now.
fields:
  - Will you have this notarized now?: users[i].will_notarize_now
    datatype: yesno
  - County: users[i].notary_county
    show if:
      variable: users[i].will_notarize_now

      is: True
    required: False
  - Date of appearance: users[i].notary_appearance_date
    show if:
      variable: users[i].will_notarize_now

      is: True
    datatype: date
    required: False
  - Notary public name: users[i].notary_name
    show if:
      variable: users[i].will_notarize_now

      is: True
    required: False
  - Commission expires: users[i].notary_commission_expires
    show if:
      variable: users[i].will_notarize_now

      is: True
    required: False
