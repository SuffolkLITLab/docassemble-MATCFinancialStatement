---
modules:
  - docassemble.base.util
---
metadata:
  title: |
    Financial Statement (Short Form)
  short title: |
    Financial Statement Short
  description: |
    Short-form financial statement questions for Massachusetts Probate and Family Court.
  LIST_topics:
    - Family law
    - Financial disclosure
  jurisdiction: NAM-US-US+MA
  landing_page_url: https://courtformsonline.org/
  authors:
    - Court Forms Online
---
id: short_form_sections
sets:
  - users[i].short_form_sections

code: |
  nav.set_section("deductions")
  set_progress(60)
  users[i].short_deductions
  users[i].short_adjusted_net_income
  users[i].short_other_deductions
  users[i].short_net_income
  users[i].short_prior_year
  users[i].fs_checkpoint_deductions
  nav.set_section("expenses")
  set_progress(70)
  users[i].expense_list.statement_user = users[i]
  users[i].expense_list.gathered
  users[i].short_expense_other_description
  users[i].short_expenses_total
  if users[i].short_expenses_require_confirmation:
    users[i].confirm_no_expenses_short_screen
  users[i].fs_checkpoint_expenses
  nav.set_section("assets")
  set_progress(80)
  users[i].short_counsel_fees
  users[i].short_assets_real_estate
  users[i].motor_vehicles.gather()
  users[i].pensions.gather()
  users[i].other_assets.gather()
  users[i].short_assets_total
  users[i].fs_checkpoint_assets
  nav.set_section("liabilities")
  set_progress(90)
  users[i].liabilities.gather()
  users[i].short_liabilities_total
  users[i].short_certification
  users[i].attorney_statement
  users[i].fs_checkpoint_liabilities
  users[i].short_form_sections = True
---
id: short_deductions
sets:
  - users[i].short_deductions

continue button field: users[i].short_deductions
question: |
  Itemized deductions from gross income
subquestion: |
  Enter the amount taken out in one pay period for each line.
  Use your chosen cadence (${ users[i].financial_cadence_default }).
  These are amounts withheld from your gross pay.

  **Examples:** federal tax, state tax, FICA, union dues.
fields:
  - Federal income tax deductions: users[i].short_deduction_federal
    datatype: currency
    required: False
  - Number of federal exemptions: users[i].short_deduction_federal_exemptions
    datatype: integer
    required: False
    min: 0
  - State income tax deductions: users[i].short_deduction_state
    datatype: currency
    required: False
  - Number of state exemptions: users[i].short_deduction_state_exemptions
    datatype: integer
    required: False
    min: 0
  - F.I.C.A. and Medicare: users[i].short_deduction_fica
    datatype: currency
    required: False
  - Medical insurance: users[i].short_deduction_medical
    datatype: currency
    required: False
  - Union dues: users[i].short_deduction_union
    datatype: currency
    required: False
---
code: |
  users[i].short_deductions_total_weekly = (
    to_weekly(value("users[i].short_deduction_federal"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_deduction_state"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_deduction_fica"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_deduction_medical"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_deduction_union"), users[i].financial_cadence_default)
  )
---
id: short_adjusted_net_income
continue button field: users[i].short_adjusted_net_income
question: |
  Adjusted net weekly income
subquestion: |
  Total deductions: ${ currency(users[i].short_deductions_total_weekly) }

  Adjusted net weekly income: ${ currency(float(users[i].income_total_weekly) - float(users[i].short_deductions_total_weekly)) }
---
code: |
  users[i].short_adjusted_net_weekly_income = float(users[i].income_total_weekly) - float(users[i].short_deductions_total_weekly)
---
id: short_other_deductions
sets:
  - users[i].short_other_deductions

continue button field: users[i].short_other_deductions
question: |
  Other deductions from salary or wages
subquestion: |
  Enter amounts using your chosen cadence (${ users[i].financial_cadence_default }).
  Include deductions not listed on the previous page.

  **Examples:** retirement contributions, savings, credit union loan payments.
fields:
  - Credit union loan repayment: users[i].short_other_deduction_credit_union_loan
    datatype: currency
    required: False
  - Savings: users[i].short_other_deduction_savings
    datatype: currency
    required: False
  - Retirement: users[i].short_other_deduction_retirement
    datatype: currency
    required: False
  - Other (specify): users[i].short_other_deduction_other_description
    required: False
  - Other amount: users[i].short_other_deduction_other_amount
    datatype: currency
    required: False
---
code: |
  users[i].short_other_deductions_total_weekly = (
    to_weekly(value("users[i].short_other_deduction_credit_union_loan"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_other_deduction_savings"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_other_deduction_retirement"), users[i].financial_cadence_default)
    + to_weekly(value("users[i].short_other_deduction_other_amount"), users[i].financial_cadence_default)
  )
---
id: short_net_income
continue button field: users[i].short_net_income
question: |
  Net weekly income
subquestion: |
  Net weekly income: ${ currency(float(users[i].short_adjusted_net_weekly_income) - float(users[i].short_other_deductions_total_weekly)) }

  This is your income after deductions.
---
code: |
  users[i].short_net_weekly_income = float(users[i].short_adjusted_net_weekly_income) - float(users[i].short_other_deductions_total_weekly)
---
id: short_prior_year
sets:
  - users[i].short_prior_year

continue button field: users[i].short_prior_year
question: |
  Prior year income
subquestion: |
  % if users.number_gathered() > 1:
  Use ${ bold(users[i].familiar(unique_names=users)) }'s most recent tax year or best estimate.
  % else:
  Use your most recent tax year or best estimate.
  % endif

  **Tip:** If you do not know the exact amount, enter your best estimate.
fields:
  - Gross yearly income from prior year: users[i].prior_year_gross_amount
    datatype: currency
    required: False
  - Number of years paid into Social Security: users[i].years_paid_into_social_security
    datatype: integer
    required: False
    min: 0
---
id: short_expenses_part_1
sets:
  - users[i].short_expenses_part_1

continue button field: users[i].short_expenses_part_1
question: |
  Weekly expenses (part 1)
subquestion: |
  Enter amounts using your chosen cadence (${ users[i].financial_cadence_default }).
  Include regular household expenses.
fields:
  - Rent or mortgage (PIT): users[i].short_expense_rent
    datatype: currency
    required: False
  - Homeowners or tenant insurance: users[i].short_expense_home_insurance
    datatype: currency
    required: False
  - Maintenance and repair: users[i].short_expense_maintenance
    datatype: currency
    required: False
  - Heat: users[i].short_expense_heat
    datatype: currency
    required: False
  - Electricity or gas: users[i].short_expense_electric
    datatype: currency
    required: False
  - Telephone: users[i].short_expense_phone
    datatype: currency
    required: False
  - Water and sewer: users[i].short_expense_water
    datatype: currency
    required: False
  - Food: users[i].short_expense_food
    datatype: currency
    required: False
  - House supplies: users[i].short_expense_supplies
    datatype: currency
    required: False
  - Laundry and cleaning: users[i].short_expense_laundry
    datatype: currency
    required: False
---
id: short_expenses_part_2
sets:
  - users[i].short_expenses_part_2

continue button field: users[i].short_expenses_part_2
question: |
  Weekly expenses (part 2)
subquestion: |
  Enter amounts using your chosen cadence (${ users[i].financial_cadence_default }).
  Include transportation and child-related expenses.
fields:
  - Clothing: users[i].short_expense_clothing
    datatype: currency
    required: False
  - Life insurance: users[i].short_expense_life_insurance
    datatype: currency
    required: False
  - Medical insurance: users[i].short_expense_medical_insurance
    datatype: currency
    required: False
  - Uninsured medicals: users[i].short_expense_uninsured_medical
    datatype: currency
    required: False
  - Incidentals and toiletries: users[i].short_expense_incidentals
    datatype: currency
    required: False
  - Motor vehicle expenses: users[i].short_expense_motor_vehicle
    datatype: currency
    required: False
  - Motor vehicle payment: users[i].short_expense_motor_vehicle_payment
    datatype: currency
    required: False
  - Child care: users[i].short_expense_child_care
    datatype: currency
    required: False
  - Other (explain): users[i].short_expense_other_description
    required: False
  - Other amount: users[i].short_expense_other_amount
    datatype: currency
    required: False
---
code: |
  users[i].short_expenses_total_weekly = users[i].expense_list.total(times_per_year=52)
---
id: short_expenses_total
continue button field: users[i].short_expenses_total
question: |
  Weekly expenses total
subquestion: |
  Total weekly expenses: ${ currency(users[i].short_expenses_total_weekly) }

  You can still go back and edit any expense before you finish.
---
code: |
  if not users[i].short_expenses_require_confirmation:
    users[i].confirm_no_expenses_short = False
---
id: confirm_no_expenses_short_screen
continue button field: users[i].confirm_no_expenses_short_screen
question: |
  Confirm no expenses
subquestion: |
  You entered $0 for expenses.

  Choose "Yes" only if you truly do not have household expenses to list.
fields:
  - Yes, I do not have household expenses to list right now: users[i].confirm_no_expenses_short
    datatype: yesnoradio
    required: True
---
code: |
  users[i].short_expenses_require_confirmation = users[i].short_expenses_total_weekly == 0
---
id: short_counsel_fees
sets:
  - users[i].short_counsel_fees

continue button field: users[i].short_counsel_fees
question: |
  Counsel fees
subquestion: |
  Fill out this section only if you have an attorney.

  % if users.number_gathered() > 1:
  If ${ bold(users[i].familiar(unique_names=users)) } does not have an attorney, you can leave every field on this page blank.
  % else:
  If you do not have an attorney, you can leave every field on this page blank.
  % endif
fields:
  - Retainer amount(s) paid to your attorney(s): users[i].short_counsel_retainer
    datatype: currency
    required: False
  - Legal fees incurred so far against retainer(s): users[i].short_counsel_fees_incurred
    datatype: currency
    required: False
  - Anticipated total legal expense (minimum): users[i].short_counsel_range_min
    datatype: currency
    required: False
  - Anticipated total legal expense (maximum): users[i].short_counsel_range_max
    datatype: currency
    required: False
---
id: short_assets_real_estate
sets:
  - users[i].short_assets_real_estate

continue button field: users[i].short_assets_real_estate
question: |
  Assets - real estate
subquestion: |
  % if users.number_gathered() > 1:
  If ${ bold(users[i].familiar(unique_names=users)) } does not own real estate, you can leave these blank.
  % else:
  If you do not own real estate, you can leave these blank.
  % endif

  Include the best numbers you have for value, mortgage balance, and equity.
  Estimates are fine.
fields:
  - Real estate location: users[i].short_real_estate_location
    required: False
  - Title held in the name of: users[i].short_real_estate_title
    required: False
  - Fair market value: users[i].short_real_estate_fmv
    datatype: currency
    required: False
  - Mortgage amount: users[i].short_real_estate_mortgage
    datatype: currency
    required: False
  - Equity: users[i].short_real_estate_equity
    datatype: currency
    required: False
  - Annuity value: users[i].short_annuity_value
    datatype: currency
    required: False
  - Life insurance cash surrender value: users[i].short_life_insurance_cash_value
    datatype: currency
    required: False
---
code: |
  _short_re = (
    fs_safe_float(value("users[i].short_real_estate_equity"))
    if defined("users[i].short_real_estate_equity")
    and value("users[i].short_real_estate_equity") not in (None, "")
    else 0.0
  )
  _short_vehicles = fs_sum_list_attr(users[i].motor_vehicles, "equity") if defined("users[i].motor_vehicles") else 0.0
  _short_pensions = 0.0
  if defined("users[i].pensions"):
    _short_pensions = (
      fs_sum_list_attr(users[i].pensions, "defined_benefit_amount")
      + fs_sum_list_attr(users[i].pensions, "defined_contribution_amount")
    )
  _short_annuity = (
    fs_safe_float(value("users[i].short_annuity_value"))
    if defined("users[i].short_annuity_value")
    and value("users[i].short_annuity_value") not in (None, "")
    else 0.0
  )
  _short_life_ins = (
    fs_safe_float(value("users[i].short_life_insurance_cash_value"))
    if defined("users[i].short_life_insurance_cash_value")
    and value("users[i].short_life_insurance_cash_value") not in (None, "")
    else 0.0
  )
  _short_other = fs_sum_list_attr(users[i].other_assets, "current_balance") if defined("users[i].other_assets") else 0.0
  users[i].short_assets_total_value = currency(
    _short_re
    + _short_vehicles
    + _short_pensions
    + _short_annuity
    + _short_life_ins
    + _short_other
  )
---
id: short_assets_total
continue button field: users[i].short_assets_total
question: |
  Assets summary
subquestion: |
  Here is a quick summary of the assets you listed:

  - **Motor vehicles:** ${ len(users[i].motor_vehicles) if defined('users[i].motor_vehicles') and users[i].motor_vehicles.there_are_any else 0 }
  - **Retirement plans:** ${ len(users[i].pensions) if defined('users[i].pensions') and users[i].pensions.there_are_any else 0 }
  - **Other assets:** ${ len(users[i].other_assets) if defined('users[i].other_assets') and users[i].other_assets.there_are_any else 0 }

  Use **Back** if you want to make changes before the form is generated.
---
id: short_liabilities_total
continue button field: users[i].short_liabilities_total
question: |
  Liabilities summary
subquestion: |
  **Liabilities listed:** ${ len(users[i].liabilities) if defined('users[i].liabilities') and users[i].liabilities.there_are_any else 0 }

  Use **Back** if you want to add or edit debts before finishing.
---
code: |
  _short_liab_due = fs_sum_list_attr(users[i].liabilities, "amount_due") if defined("users[i].liabilities") else 0.0
  _short_liab_weekly = fs_sum_list_attr(users[i].liabilities, "weekly_payment") if defined("users[i].liabilities") else 0.0
  users[i].short_liabilities_total_amount_due = currency(_short_liab_due)
  users[i].short_liabilities_total_weekly_payment = currency(_short_liab_weekly)
---
id: short_certification
sets:
  - users[i].short_certification

continue button field: users[i].short_certification
question: |
  Certification
subquestion: |
  Sign to certify that the information you provided is true to the best of
  % if users.number_gathered() > 1:
  ${ bold(users[i].familiar(unique_names=users)) }'s knowledge.
  % else:
  your knowledge.
  % endif

  % if users.number_gathered() > 1:
  Enter ${ bold(users[i].familiar(unique_names=users)) }'s signature and the date the statement is being signed.
  % else:
  Enter your signature and the date you are signing this statement.
  % endif
fields:
  - Signature: users[i].user_signature
    required: False
  - Signature date: users[i].user_signature_date
    datatype: date
    required: False
