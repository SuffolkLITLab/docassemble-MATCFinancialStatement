---
modules:
  - docassemble.base.util
---
metadata:
  title: |
    Financial Statement (Short Form)
  short title: |
    Financial Statement Short
  description: |
    Short-form financial statement questions for Massachusetts Probate and Family Court.
  LIST_topics:
    - Family law
    - Financial disclosure
  jurisdiction: NAM-US-US+MA
  landing_page_url: https://courtformsonline.org/
  authors:
    - Court Forms Online
---
id: short_form_sections
sets:
  - fs_user.short_form_sections

code: |
  nav.set_section("deductions")
  set_progress(60)
  fs_user.short_deductions
  fs_user.short_adjusted_net_income
  fs_user.short_other_deductions
  fs_user.short_net_income
  fs_user.short_prior_year
  fs_user.fs_checkpoint_deductions
  nav.set_section("expenses")
  set_progress(70)
  fs_user.expense_list.gathered
  fs_user.short_expense_other_description
  fs_user.short_expenses_total
  if fs_user.short_expenses_require_confirmation:
    fs_user.confirm_no_expenses_short_screen
  fs_user.fs_checkpoint_expenses
  nav.set_section("assets")
  set_progress(80)
  fs_user.short_counsel_fees
  fs_user.short_assets_real_estate
  fs_user.motor_vehicles.gather()
  fs_user.pensions.gather()
  fs_user.other_assets.gather()
  fs_user.short_assets_total
  fs_user.fs_checkpoint_assets
  nav.set_section("liabilities")
  set_progress(90)
  fs_user.liabilities.gather()
  fs_user.short_liabilities_total
  fs_user.short_certification
  fs_user.attorney_statement
  fs_user.fs_checkpoint_liabilities
  fs_user.short_form_sections = True
---
id: short_deductions
sets:
  - fs_user.short_deductions

continue button field: fs_user.short_deductions
question: |
  Itemized deductions from gross income
subquestion: |
  Enter the amount taken out in one pay period for each line.
  Use your chosen cadence (${ fs_user.financial_cadence_default }).
  These are amounts withheld from your gross pay.

  **Examples:** federal tax, state tax, FICA, union dues.
fields:
  - Federal income tax deductions: fs_user.short_deduction_federal
    datatype: currency
    required: False
  - Number of federal exemptions: fs_user.short_deduction_federal_exemptions
    datatype: integer
    required: False
    min: 0
  - State income tax deductions: fs_user.short_deduction_state
    datatype: currency
    required: False
  - Number of state exemptions: fs_user.short_deduction_state_exemptions
    datatype: integer
    required: False
    min: 0
  - F.I.C.A. and Medicare: fs_user.short_deduction_fica
    datatype: currency
    required: False
  - Medical insurance: fs_user.short_deduction_medical
    datatype: currency
    required: False
  - Union dues: fs_user.short_deduction_union
    datatype: currency
    required: False
---
code: |
  fs_user.short_deductions_total_weekly = (
    to_weekly(value("fs_user.short_deduction_federal"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_deduction_state"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_deduction_fica"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_deduction_medical"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_deduction_union"), fs_user.financial_cadence_default)
  )
---
id: short_adjusted_net_income
continue button field: fs_user.short_adjusted_net_income
question: |
  Adjusted net weekly income
subquestion: |
  Total deductions: ${ currency(fs_user.short_deductions_total_weekly) }

  Adjusted net weekly income: ${ currency(float(fs_user.income_total_weekly) - float(fs_user.short_deductions_total_weekly)) }
---
code: |
  fs_user.short_adjusted_net_weekly_income = float(fs_user.income_total_weekly) - float(fs_user.short_deductions_total_weekly)
---
id: short_other_deductions
sets:
  - fs_user.short_other_deductions

continue button field: fs_user.short_other_deductions
question: |
  Other deductions from salary or wages
subquestion: |
  Enter amounts using your chosen cadence (${ fs_user.financial_cadence_default }).
  Include deductions not listed on the previous page.

  **Examples:** retirement contributions, savings, credit union loan payments.
fields:
  - Credit union loan repayment: fs_user.short_other_deduction_credit_union_loan
    datatype: currency
    required: False
  - Savings: fs_user.short_other_deduction_savings
    datatype: currency
    required: False
  - Retirement: fs_user.short_other_deduction_retirement
    datatype: currency
    required: False
  - Other (specify): fs_user.short_other_deduction_other_description
    required: False
  - Other amount: fs_user.short_other_deduction_other_amount
    datatype: currency
    required: False
---
code: |
  fs_user.short_other_deductions_total_weekly = (
    to_weekly(value("fs_user.short_other_deduction_credit_union_loan"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_other_deduction_savings"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_other_deduction_retirement"), fs_user.financial_cadence_default)
    + to_weekly(value("fs_user.short_other_deduction_other_amount"), fs_user.financial_cadence_default)
  )
---
id: short_net_income
continue button field: fs_user.short_net_income
question: |
  Net weekly income
subquestion: |
  Net weekly income: ${ currency(float(fs_user.short_adjusted_net_weekly_income) - float(fs_user.short_other_deductions_total_weekly)) }

  This is your income after deductions.
---
code: |
  fs_user.short_net_weekly_income = float(fs_user.short_adjusted_net_weekly_income) - float(fs_user.short_other_deductions_total_weekly)
---
id: short_prior_year
sets:
  - fs_user.short_prior_year

continue button field: fs_user.short_prior_year
question: |
  Prior year income
subquestion: |
  Use your most recent tax year or best estimate.

  **Tip:** If you do not know the exact amount, enter your best estimate.
fields:
  - Gross yearly income from prior year: fs_user.prior_year_gross_amount
    datatype: currency
    required: False
  - Number of years paid into Social Security: fs_user.years_paid_into_social_security
    datatype: integer
    required: False
    min: 0
---
id: short_expenses_part_1
sets:
  - fs_user.short_expenses_part_1

continue button field: fs_user.short_expenses_part_1
question: |
  Weekly expenses (part 1)
subquestion: |
  Enter amounts using your chosen cadence (${ fs_user.financial_cadence_default }).
  Include regular household expenses.
fields:
  - Rent or mortgage (PIT): fs_user.short_expense_rent
    datatype: currency
    required: False
  - Homeowners or tenant insurance: fs_user.short_expense_home_insurance
    datatype: currency
    required: False
  - Maintenance and repair: fs_user.short_expense_maintenance
    datatype: currency
    required: False
  - Heat: fs_user.short_expense_heat
    datatype: currency
    required: False
  - Electricity or gas: fs_user.short_expense_electric
    datatype: currency
    required: False
  - Telephone: fs_user.short_expense_phone
    datatype: currency
    required: False
  - Water and sewer: fs_user.short_expense_water
    datatype: currency
    required: False
  - Food: fs_user.short_expense_food
    datatype: currency
    required: False
  - House supplies: fs_user.short_expense_supplies
    datatype: currency
    required: False
  - Laundry and cleaning: fs_user.short_expense_laundry
    datatype: currency
    required: False
---
id: short_expenses_part_2
sets:
  - fs_user.short_expenses_part_2

continue button field: fs_user.short_expenses_part_2
question: |
  Weekly expenses (part 2)
subquestion: |
  Enter amounts using your chosen cadence (${ fs_user.financial_cadence_default }).
  Include transportation and child-related expenses.
fields:
  - Clothing: fs_user.short_expense_clothing
    datatype: currency
    required: False
  - Life insurance: fs_user.short_expense_life_insurance
    datatype: currency
    required: False
  - Medical insurance: fs_user.short_expense_medical_insurance
    datatype: currency
    required: False
  - Uninsured medicals: fs_user.short_expense_uninsured_medical
    datatype: currency
    required: False
  - Incidentals and toiletries: fs_user.short_expense_incidentals
    datatype: currency
    required: False
  - Motor vehicle expenses: fs_user.short_expense_motor_vehicle
    datatype: currency
    required: False
  - Motor vehicle payment: fs_user.short_expense_motor_vehicle_payment
    datatype: currency
    required: False
  - Child care: fs_user.short_expense_child_care
    datatype: currency
    required: False
  - Other (explain): fs_user.short_expense_other_description
    required: False
  - Other amount: fs_user.short_expense_other_amount
    datatype: currency
    required: False
---
code: |
  fs_user.short_expenses_total_weekly = fs_user.expense_list.total(times_per_year=52)
---
id: short_expenses_total
continue button field: fs_user.short_expenses_total
question: |
  Weekly expenses total
subquestion: |
  Total weekly expenses: ${ currency(fs_user.short_expenses_total_weekly) }

  You can still go back and edit any expense before you finish.
---
code: |
  if not fs_user.short_expenses_require_confirmation:
    fs_user.confirm_no_expenses_short = False
---
id: confirm_no_expenses_short_screen
continue button field: fs_user.confirm_no_expenses_short_screen
question: |
  Confirm no expenses
subquestion: |
  You entered $0 for expenses.

  Choose "Yes" only if you truly do not have household expenses to list.
fields:
  - Yes, I do not have household expenses to list right now: fs_user.confirm_no_expenses_short
    datatype: yesnoradio
    required: True
---
code: |
  fs_user.short_expenses_require_confirmation = fs_user.short_expenses_total_weekly == 0
---
id: short_counsel_fees
sets:
  - fs_user.short_counsel_fees

continue button field: fs_user.short_counsel_fees
question: |
  Counsel fees
subquestion: |
  Fill out this section only if you have an attorney.

  If you do not have an attorney, you can leave every field on this page blank.
fields:
  - Retainer amount(s) paid to your attorney(s): fs_user.short_counsel_retainer
    datatype: currency
    required: False
  - Legal fees incurred so far against retainer(s): fs_user.short_counsel_fees_incurred
    datatype: currency
    required: False
  - Anticipated total legal expense (minimum): fs_user.short_counsel_range_min
    datatype: currency
    required: False
  - Anticipated total legal expense (maximum): fs_user.short_counsel_range_max
    datatype: currency
    required: False
---
id: short_assets_real_estate
sets:
  - fs_user.short_assets_real_estate

continue button field: fs_user.short_assets_real_estate
question: |
  Assets - real estate
subquestion: |
  If you do not own real estate, you can leave these blank.

  Include the best numbers you have for value, mortgage balance, and equity.
  Estimates are fine.
fields:
  - Real estate location: fs_user.short_real_estate_location
    required: False
  - Title held in the name of: fs_user.short_real_estate_title
    required: False
  - Fair market value: fs_user.short_real_estate_fmv
    datatype: currency
    required: False
  - Mortgage amount: fs_user.short_real_estate_mortgage
    datatype: currency
    required: False
  - Equity: fs_user.short_real_estate_equity
    datatype: currency
    required: False
  - Annuity value: fs_user.short_annuity_value
    datatype: currency
    required: False
  - Life insurance cash surrender value: fs_user.short_life_insurance_cash_value
    datatype: currency
    required: False
---
code: |
  _short_re = (
    fs_safe_float(value("fs_user.short_real_estate_equity"))
    if defined("fs_user.short_real_estate_equity")
    and value("fs_user.short_real_estate_equity") not in (None, "")
    else 0.0
  )
  _short_vehicles = fs_sum_list_attr(fs_user.motor_vehicles, "equity") if defined("fs_user.motor_vehicles") else 0.0
  _short_pensions = 0.0
  if defined("fs_user.pensions"):
    _short_pensions = (
      fs_sum_list_attr(fs_user.pensions, "defined_benefit_amount")
      + fs_sum_list_attr(fs_user.pensions, "defined_contribution_amount")
    )
  _short_annuity = (
    fs_safe_float(value("fs_user.short_annuity_value"))
    if defined("fs_user.short_annuity_value")
    and value("fs_user.short_annuity_value") not in (None, "")
    else 0.0
  )
  _short_life_ins = (
    fs_safe_float(value("fs_user.short_life_insurance_cash_value"))
    if defined("fs_user.short_life_insurance_cash_value")
    and value("fs_user.short_life_insurance_cash_value") not in (None, "")
    else 0.0
  )
  _short_other = fs_sum_list_attr(fs_user.other_assets, "current_balance") if defined("fs_user.other_assets") else 0.0
  fs_user.short_assets_total_value = currency(
    _short_re
    + _short_vehicles
    + _short_pensions
    + _short_annuity
    + _short_life_ins
    + _short_other
  )
---
id: short_assets_total
continue button field: fs_user.short_assets_total
question: |
  Assets summary
subquestion: |
  Here is a quick summary of the assets you listed:

  - **Motor vehicles:** ${ len(fs_user.motor_vehicles) if defined('fs_user.motor_vehicles') and fs_user.motor_vehicles.there_are_any else 0 }
  - **Retirement plans:** ${ len(fs_user.pensions) if defined('fs_user.pensions') and fs_user.pensions.there_are_any else 0 }
  - **Other assets:** ${ len(fs_user.other_assets) if defined('fs_user.other_assets') and fs_user.other_assets.there_are_any else 0 }

  Use **Back** if you want to make changes before the form is generated.
---
id: short_liabilities_total
continue button field: fs_user.short_liabilities_total
question: |
  Liabilities summary
subquestion: |
  **Liabilities listed:** ${ len(fs_user.liabilities) if defined('fs_user.liabilities') and fs_user.liabilities.there_are_any else 0 }

  Use **Back** if you want to add or edit debts before you finish.
---
code: |
  _short_liab_due = fs_sum_list_attr(fs_user.liabilities, "amount_due") if defined("fs_user.liabilities") else 0.0
  _short_liab_weekly = fs_sum_list_attr(fs_user.liabilities, "weekly_payment") if defined("fs_user.liabilities") else 0.0
  fs_user.short_liabilities_total_amount_due = currency(_short_liab_due)
  fs_user.short_liabilities_total_weekly_payment = currency(_short_liab_weekly)
---
id: short_certification
sets:
  - fs_user.short_certification

continue button field: fs_user.short_certification
question: |
  Certification
subquestion: |
  Sign to certify that the information you provided is true to the best of
  your knowledge.

  Enter your signature and the date you are signing this statement.
fields:
  - Signature: fs_user.user_signature
    required: False
  - Signature date: fs_user.user_signature_date
    datatype: date
    required: False
