    user.financial_statement_long_attachment.enabled = (
      defined(f"{user.instanceName}.making_statement_for")
      and user.making_statement_for
      and defined(f"{user.instanceName}.financial_form_type")
      and user.financial_form_type == "long"
    )
    user.financial_statement_schedule_a_attachment.enabled = (
      defined(f"{user.instanceName}.making_statement_for")
      and user.making_statement_for
      and defined(f"{user.instanceName}.has_self_employment_income")
      and user.has_self_employment_income
    )
    user.financial_statement_schedule_b_attachment.enabled = (
      defined(f"{user.instanceName}.making_statement_for")
      and user.making_statement_for
      and defined(f"{user.instanceName}.has_rental_income")
      and user.has_rental_income
    )
