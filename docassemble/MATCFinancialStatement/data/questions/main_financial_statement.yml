code: |
  financial_statement_attachments = []
  for user in users:
    if user.making_statement_for:
      if user.financial_form_type == "short":
        financial_statement_attachments.append(user.financial_statement_short_attachment)
      else:
        financial_statement_attachments.append(user.financial_statement_long_attachment)
      if user.has_self_employment_income:
        financial_statement_attachments.append(user.financial_statement_schedule_a_attachment)
      if user.has_rental_income:
        financial_statement_attachments.append(user.financial_statement_schedule_b_attachment)
---
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=financial_statement_attachments, filename="financial_statement", title="All financial statement forms for your records", enabled=True)
  - al_court_bundle: ALDocumentBundle.using(elements=financial_statement_attachments, filename="financial_statement", title="All financial statement forms for the court", enabled=True)
