---
id: schedule_a_accounting
sets:
  - users[i].schedule_a_accounting

continue button field: users[i].schedule_a_accounting
question: |
  Accounting basis
subquestion: |
  Most small businesses use calendar year accounting.
fields:
  - Accounting basis: users[i].schedule_a_accounting_basis
    input type: radio
    choices:
      - Calendar year: calendar
      - Fiscal year: fiscal
  - Fiscal year start date: users[i].schedule_a_fiscal_start
    show if:
      variable: users[i].schedule_a_accounting_basis

      is: fiscal
    required: False
  - Fiscal year end date: users[i].schedule_a_fiscal_end
    show if:
      variable: users[i].schedule_a_accounting_basis

      is: fiscal
    required: False
---
id: schedule_a_year_to_date
sets:
  - users[i].schedule_a_year_to_date

continue button field: users[i].schedule_a_year_to_date
question: |
  This year so far
subquestion: |
  Enter totals from the start of the year through today, if known.
fields:
  - Gross receipts this year so far: users[i].schedule_a_gross_receipts_ytd
    datatype: currency
    required: False
  - Gross expenses this year so far: users[i].schedule_a_gross_expenses_ytd
    datatype: currency
    required: False
