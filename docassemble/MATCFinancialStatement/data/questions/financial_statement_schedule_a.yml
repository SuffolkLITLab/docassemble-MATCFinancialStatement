---
modules:
  - docassemble.base.util
---
metadata:
  title: |
    Financial Statement Schedule A
  short title: |
    Schedule A
  description: |
    Schedule A questions for self-employment or business income.
  LIST_topics:
    - Family law
    - Financial disclosure
  jurisdiction: NAM-US-US+MA
  landing_page_url: https://courtformsonline.org/
  authors:
    - Court Forms Online
---
variable name: schedule_a_expense_choices
data:
  - [cost_goods, "Cost of goods sold"]
  - [advertising, "Advertising"]
  - [bad_debts, "Bad debts"]
  - [motor_vehicle_gas, "Motor vehicles - gas"]
  - [motor_vehicle_insurance, "Motor vehicles - insurance"]
  - [motor_vehicle_maintenance, "Motor vehicles - maintenance"]
  - [motor_vehicle_registration, "Motor vehicles - registration"]
  - [commissions, "Commissions"]
  - [depletion, "Depletion"]
  - [dues_publications, "Dues and publications"]
  - [employee_benefits, "Employee benefit programs"]
  - [freight, "Freight"]
  - [insurance_other, "Insurance (other than health)"]
  - [mortgage_interest, "Interest on mortgage to banks"]
  - [loan_interest, "Interest on loans"]
  - [legal_professional, "Legal and professional services"]
  - [office_expenses, "Office expenses"]
  - [laundry_cleaning, "Laundry and cleaning"]
  - [pension_profit_sharing, "Pension and profit sharing"]
  - [rent_leased_equipment, "Rent on leased equipment"]
  - [machinery_equipment, "Machinery and equipment"]
  - [other_business_property, "Other business property"]
  - [repairs, "Repairs"]
  - [supplies, "Supplies"]
  - [taxes, "Taxes"]
  - [travel, "Travel"]
  - [meals_entertainment, "Meals and entertainment"]
  - [utilities_phones, "Utilities and phones"]
  - [wages, "Wages"]
  - [other, "Other expenses"]
---
id: schedule_a_sections
sets:
  - users[i].schedule_a_sections

code: |
  users[i].schedule_a_intro
  users[i].schedule_a_gross_receipts
  users[i].schedule_a_expenses_list
  users[i].schedule_a_expenses.statement_user = users[i]
  users[i].schedule_a_expenses.gather()
  users[i].schedule_a_expense_totals
  users[i].schedule_a_weekly_income
  users[i].schedule_a_business_nature
  users[i].schedule_a_seasonal
  users[i].schedule_a_accounting
  users[i].schedule_a_year_to_date
  users[i].schedule_a_sections = True
---
id: schedule_a_intro
continue button field: users[i].schedule_a_intro
question: |
  Schedule A: self-employment or business income
subquestion: |
  % if users.number_gathered() > 1:
  ${ bold(users[i].familiar(unique_names=users)) } indicated self-employment or business income.
  % else:
  You indicated that you have self-employment or business income.
  % endif
  This schedule asks for business income and business expenses.
---
id: schedule_a_gross_receipts
sets:
  - users[i].schedule_a_gross_receipts

continue button field: users[i].schedule_a_gross_receipts
question: |
  Gross monthly receipts
subquestion: |
  % if users.number_gathered() > 1:
  Enter ${ bold(users[i].familiar(unique_names=users)) }'s typical total receipts for one month before expenses.
  % else:
  Enter your typical total receipts for one month before expenses.
  % endif
fields:
  - Gross monthly receipts: users[i].schedule_a_gross_monthly_receipts
    datatype: currency
    required: False
    help: |
      Enter total monthly receipts before expenses.
---
id: schedule_a_expenses_list
sets:
  - users[i].schedule_a_expenses_list

continue button field: users[i].schedule_a_expenses_list
question: |
  Monthly business expenses
subquestion: |
  Add each expense line item and its monthly amount. If you are not sure,
  give your best estimate.
fields:
  - label: |
      % if users.number_gathered() > 1:
      Does ${ bold(users[i].familiar(unique_names=users)) } have business expenses to list?
      % else:
      Do you have business expenses to list?
      % endif
    field: users[i].schedule_a_expenses.there_are_any
    datatype: yesno
---
id: schedule_a_expense_item
question: |
  Business expense
subquestion: |
  Enter the monthly amount for this category.
fields:
  - Expense category: users[i].schedule_a_expenses[j].source
    code: |
      schedule_a_expense_choices
  - Expense description (if needed): users[i].schedule_a_expenses[j].description
    required: False
  - Monthly amount: users[i].schedule_a_expenses[j].value
    datatype: currency
    required: False
    help: |
      Enter the total amount you pay in a typical month for this category.
---
code: |
  users[i].schedule_a_expenses[j].times_per_year = 12
  users[i].schedule_a_expenses[j].display_name = dict(schedule_a_expense_choices).get(
    users[i].schedule_a_expenses[j].source,
    users[i].schedule_a_expenses[j].source,
  )
  users[i].schedule_a_expenses[j].complete = True
---
code: |
  if defined("users[i].schedule_a_expenses.there_are_any"):
    if users[i].schedule_a_expenses.there_are_any:
      for expense in users[i].schedule_a_expenses.elements:
        expense.value
    users[i].schedule_a_expenses.revisit = True
---
table: users[i].schedule_a_expenses.table
rows: users[i].schedule_a_expenses
columns:
  - Expense: |
      row_item.display_name if hasattr(row_item, "display_name") else row_item.source
  - Monthly amount: |
      currency(row_item.total(times_per_year=12))
edit:
  - source

  - description

  - value

---
id: schedule_a_expenses_revisit
continue button field: users[i].schedule_a_expenses.revisit
question: |
  Edit business expenses
subquestion: |
  % if defined("users[i].schedule_a_expenses.there_are_any") and users[i].schedule_a_expenses.there_are_any and len(users[i].schedule_a_expenses):
  ${ users[i].schedule_a_expenses.table }
  % else:
  % if users.number_gathered() > 1:
  ${ bold(users[i].familiar(unique_names=users)) } has not added any business expenses yet.
  % else:
  You have not added any business expenses yet.
  % endif
  % endif

  Use "Add another" if you need to add an expense now.

  ${ users[i].schedule_a_expenses.add_action() }
---
id: schedule_a_expenses_more
question: |
  Do you have another business expense to add?
subquestion: |
  Check this box only if you have another business expense to add.
fields:
  - label: |
      % if users.number_gathered() > 1:
      Does ${ bold(users[i].familiar(unique_names=users)) } have another business expense to add?
      % else:
      Do you have another business expense to add?
      % endif
    field: users[i].schedule_a_expenses.there_is_another
    datatype: yesno
---
code: |
  users[i].schedule_a_total_monthly_expenses = float(users[i].schedule_a_expenses.total(times_per_year=12))
---
id: schedule_a_expense_totals
continue button field: users[i].schedule_a_expense_totals
question: |
  Total monthly expenses
subquestion: |
  Total monthly expenses: ${ currency(users[i].schedule_a_total_monthly_expenses) }
---
code: |
  users[i].schedule_a_weekly_business_income = (
    (float(value("users[i].schedule_a_gross_monthly_receipts") or 0) - users[i].schedule_a_total_monthly_expenses) / 4.3
  )
---
id: schedule_a_weekly_income
continue button field: users[i].schedule_a_weekly_income
question: |
  Weekly business income
subquestion: |
  Weekly business income = (gross monthly receipts - total monthly expenses) divided by 4.3
  ${ currency(users[i].schedule_a_weekly_business_income) }
---
id: schedule_a_business_nature
continue button field: users[i].schedule_a_business_nature
question: |
  Nature of self-employment or business
subquestion: |
  Examples: "landscaping", "rideshare driver", or "online retail".
fields:
  - Describe the nature of the business: users[i].schedule_a_business_nature
    required: False
    help: |
      Examples: consulting, delivery, childcare, online sales.
---
id: schedule_a_seasonal
sets:
  - users[i].schedule_a_seasonal

continue button field: users[i].schedule_a_seasonal
question: |
  Seasonal business
subquestion: |
  If your business is seasonal, estimate the percentage of income and expenses
  for each month.
fields:
  - Is this business seasonal?: users[i].schedule_a_is_seasonal
    datatype: yesno
  - January income percentage: users[i].schedule_a_january_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - January expenses percentage: users[i].schedule_a_january_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - February income percentage: users[i].schedule_a_february_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - February expenses percentage: users[i].schedule_a_february_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - March income percentage: users[i].schedule_a_march_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - March expenses percentage: users[i].schedule_a_march_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - April income percentage: users[i].schedule_a_april_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - April expenses percentage: users[i].schedule_a_april_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - May income percentage: users[i].schedule_a_may_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - May expenses percentage: users[i].schedule_a_may_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - June income percentage: users[i].schedule_a_june_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - June expenses percentage: users[i].schedule_a_june_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - July income percentage: users[i].schedule_a_july_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - July expenses percentage: users[i].schedule_a_july_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - August income percentage: users[i].schedule_a_august_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - August expenses percentage: users[i].schedule_a_august_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - September income percentage: users[i].schedule_a_september_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - September expenses percentage: users[i].schedule_a_september_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - October income percentage: users[i].schedule_a_october_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - October expenses percentage: users[i].schedule_a_october_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - November income percentage: users[i].schedule_a_november_income_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - November expenses percentage: users[i].schedule_a_november_expense_pct
    datatype: number
    show if:
      variable: users[i].schedule_a_is_seasonal

      is: True
    required: False
  - December income percentage: users[i].schedule_a_december_income_pct
    datatype: number
